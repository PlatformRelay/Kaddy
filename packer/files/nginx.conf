# Golden-image nginx config. Mirrors deploy/workloads/caddy-mvp/configmap-nginx.yaml
# but serves static content directly (no upstream) + exposes /stub_status for the
# nginx-prometheus-exporter, which republishes it as /metrics under job="caddy".
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;
events { worker_connections 128; }
http {
  access_log /var/log/nginx/access.log;
  server {
    listen 80;
    root /srv;
    index index.html;

    location /healthz { return 200 'ok'; }

    # Consumed by nginx-prometheus-exporter, exported as /metrics (job="caddy").
    location /stub_status {
      stub_status;
      allow 127.0.0.1;
      deny all;
    }

    location / {
      try_files $uri $uri/ =404;
    }
  }
}

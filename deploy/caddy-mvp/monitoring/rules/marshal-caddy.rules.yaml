# Plain Prometheus rule-group projection of marshal-caddy.yaml (.spec), committed so
# the epic's promtool suite can load it directly via a relative rule_files: path —
# WITHOUT the extract-rules.sh /tmp step (that step is for ACTIVE platform rules only).
#
# REQ-CADDY-S01-03 — VM-variant alerting (parked E5 caddy_* marshal alert, D-026).
# Keep this in sync with deploy/caddy-mvp/monitoring/rules/marshal-caddy.yaml (the
# PrometheusRule CR that GitOps applies once the VM tenant lands). This projection is
# the CR's .spec verbatim.
#
# Verify (standalone, no extract): promtool test rules tests/promtool/caddy-mvp-marshal.test.yaml
groups:
  - name: marshal.caddy
    rules:
      - alert: CaddyTargetDown
        # REQ-E5-S03-01 (parked → REQ-CADDY-S01-03): fire when Caddy targets are
        # absent for 2m. Two failure modes must fire this alert:
        #   1. present-but-failing — the target is scraped but reports up == 0.
        #   2. absent — the pods/VM vanished, so no up{job="caddy"} series exists at
        #      all and up == 0 can never match. absent() covers this case.
        # The combined expr detects both without dropping the present-but-failing
        # coverage. absent() synthesizes only {job="caddy"} (no instance label).
        expr: absent(up{job="caddy"}) or up{job="caddy"} == 0
        for: 2m
        labels:
          severity: critical
          service: caddy
          owner: platform-team
        annotations:
          summary: 'Caddy scrape target down'
          # Instance-independent wording: the absent() branch has no instance
          # label, so a per-instance description would render an empty gap.
          description: >-
            Caddy scrape target (job caddy) has been down or absent for more
            than 2 minutes. Requests may be failing at the gateway.

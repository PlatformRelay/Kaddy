# REQ-CADDY-S02-03 — scrape Caddy origin in ns caddy-mvp (re-pointed from parked
# gateway selector; D-026 real target path).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: caddy
  namespace: monitoring
  labels:
    owner: platform-team
    service: caddy
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: tenant
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: caddy
  namespaceSelector:
    matchNames:
      - caddy-mvp
  podTargetLabels:
    - track
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - targetLabel: job
          replacement: caddy

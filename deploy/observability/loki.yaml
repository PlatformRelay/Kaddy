# REQ-E3-S02-03: Grafana Loki — single-binary + filesystem storage (ADR-0108).
#
# The grafana/loki chart defaults to the SimpleScalable / distributed topology,
# which spins up read/write/backend rings and (on newer charts) expects an object
# store + a memberlist/cache. For an 8GB lab node that OOMs. We force the
# SingleBinary deployment mode with filesystem storage: ONE Loki pod, no object
# store, no caches, minimal retention.
#
# CAPACITY TRIMS: single replica; filesystem chunks on the pod's ephemeral disk;
# chunk/results caches disabled; canary + gateway + ruler off; small requests.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  labels:
    owner: platform-team
    service: loki
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    helm:
      releaseName: loki
      valuesObject:
        # --- deployment topology: single binary, filesystem ---
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          # Chart requires an explicit schema config for SingleBinary/filesystem.
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 72h
            allow_structured_metadata: true
          # Silence the "no object store" ring/analytics chatter in a lab.
          analytics:
            reporting_enabled: false
          pattern_ingester:
            enabled: false
          querier:
            max_concurrent: 2
        # SingleBinary: exactly one replica, no PVC (ephemeral is fine for a lab).
        singleBinary:
          replicas: 1
          persistence:
            enabled: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        # --- turn OFF everything the distributed topology would create ---
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
        # No gateway / caches / self-monitoring / canary for the lab.
        gateway:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          serviceMonitor:
            enabled: false
          rules:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

# REQ-E3-S02-01/02/05: kube-prometheus-stack (Prometheus Operator + Prometheus +
# Alertmanager + Grafana + node-exporter + kube-state-metrics) as a Helm
# Application in ns `monitoring`.
#
# CAPACITY TRIMS (8GB single kind node — defaults OOM):
#   - Prometheus & Alertmanager: single replica, HA off, Thanos off.
#   - Prometheus retention 12h, small TSDB.
#   - Explicit small requests/limits on every component.
#   - Grafana sidecars kept ON only for datasource discovery (label
#     grafana_datasource=1) so the Loki datasource ConfigMap (S02-05) is picked
#     up; dashboard sidecar left on (cheap) for the demo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    owner: platform-team
    service: kube-prometheus-stack
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  project: observability
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.16.1
    helm:
      releaseName: kube-prometheus-stack
      # Server-side apply not needed here; the chart CRDs install via the
      # bundled crds. Skip CRD hooks handled by syncOptions below.
      valuesObject:
        # SEC-14 (audit P2-2): pin explicit, hardened securityContexts at the
        # values layer (defense in depth). The kube-prometheus-stack chart already
        # applies non-root/dropped-caps/RuntimeDefault-seccomp defaults to Grafana
        # and to the Prometheus/Alertmanager operator CRs; pinning them here means
        # a chart-default regression cannot silently drop that hardening.
        # readOnlyRootFilesystem is intentionally NOT forced on these components
        # (Grafana writes its SQLite DB; Prometheus/Alertmanager write TSDB/state).
        # EXCEPTION — prometheus-node-exporter (below): a host-metrics DaemonSet
        # needing hostPath/host-PID access; its upstream context is left at the
        # chart default (do NOT force a context that breaks host access). Compensating
        # admission control: deploy/policies/kyverno/require-run-as-nonroot.yaml (Enforce).
        # --- global / HA off ---
        fullnameOverride: kps
        defaultRules:
          create: true
        alertmanager:
          alertmanagerSpec:
            replicas: 1
            retention: 24h
            # SEC-14: explicit pod securityContext (matches chart default).
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 2000
              fsGroup: 2000
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 96Mi
        prometheus:
          prometheusSpec:
            replicas: 1
            shards: 1
            retention: 12h
            retentionSize: 1GB
            # Discover ServiceMonitors/PodMonitors cluster-wide, not just those
            # carrying the chart's release label (so E5 marshal monitors match).
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            # SEC-14: explicit pod securityContext (matches chart default).
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 2000
              fsGroup: 2000
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 200m
                memory: 400Mi
              limits:
                cpu: 500m
                memory: 700Mi
            # No PVC — ephemeral TSDB is fine for a 12h-retention lab.
        grafana:
          enabled: true
          replicas: 1
          defaultDashboardsEnabled: true
          # SEC-14: explicit pod + container securityContext (matches chart
          # default). readOnlyRootFilesystem is left OFF — Grafana writes its
          # SQLite DB / plugin cache to the container filesystem.
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          # admin creds (SEC-12 / review P1-3): sourced from the Kubernetes
          # Secret monitoring/grafana-admin — created out-of-band with a
          # random password by `task bootstrap:e1c`, never committed. SOPS/
          # KSOPS ownership of this Secret lands with E1d (identity epic);
          # the smoke helpers read it via the API (tests/smoke/e5-lib.sh).
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            # 2026-07-16: raised from 200m/256Mi — Grafana 12.x unified-storage
            # cleanup + SQLite churn CPU-starved the pod into a liveness
            # crash-loop once dashboards/alerts/datasources were provisioned.
            limits:
              cpu: 400m
              memory: 512Mi
          # Sidecar watches ConfigMaps labelled grafana_datasource=1 and
          # provisions them — this is how the Loki datasource (S02-05) is wired.
          sidecar:
            datasources:
              enabled: true
              label: grafana_datasource
              labelValue: "1"
            dashboards:
              enabled: true
        # --- keep small, useful exporters ---
        # SEC-14 EXCEPTION: prometheus-node-exporter is a host-metrics DaemonSet
        # (hostPath / host network+PID). Its upstream chart already runs it with an
        # appropriate hardened-but-host securityContext; we deliberately leave that
        # at the chart default and do NOT force a non-root/RO-rootfs context that
        # would break host access — mirroring the Alloy host-access carve-out in
        # deploy/policies/kyverno/require-run-as-nonroot.yaml.
        nodeExporter:
          enabled: true
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        kubeStateMetrics:
          enabled: true
        kube-state-metrics:
          resources:
            requests:
              cpu: 20m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # The chart re-derives Grafana's `checksum/*` pod annotations and its admin
  # Secret on every render, which Argo CD otherwise reports as perpetual
  # OutOfSync even though Grafana is Healthy. Ignore exactly those fields (a
  # documented, well-known kube-prometheus-stack + Argo CD interaction) so the
  # app settles Synced/Healthy without masking real drift elsewhere.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: kube-prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1config
        - /spec/template/metadata/annotations/checksum~1secret
        - /spec/template/metadata/annotations/checksum~1sc-dashboard-provider-config
    - group: ""
      kind: Secret
      name: kube-prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    # The chart bundles large CRDs; give the first sync room to install them.

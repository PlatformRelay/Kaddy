# ADR-0106 pod-security baseline: require runAsNonRoot (the clubhouse
# Deployment is the reference implementation — pod-level runAsNonRoot: true).
# AUTHORED, NOT YET APPLIED — see deploy/policies/README.md.
#
# Audit (not Enforce) on first sync: chart-managed observability pods will
# flag here first (security review P2-2); flip to Enforce only after the
# Audit report is clean. kube-* namespaces excluded (node agents run root).
# Offline test: kyverno test tests/kyverno/require-run-as-nonroot/.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: require-run-as-nonroot
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-BASELINE
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must run as a non-root user: runAsNonRoot must be true
      either at the pod securityContext level or on every container, init
      container and ephemeral container.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - local-path-storage
      validate:
        message: >-
          Running as root is not allowed (ADR-0106). Set runAsNonRoot: true
          at the pod level, or on every (init/ephemeral) container.
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
              =(ephemeralContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
              =(initContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
              containers:
                - =(securityContext):
                    =(runAsNonRoot): true
          - spec:
              =(ephemeralContainers):
                - securityContext:
                    runAsNonRoot: true
              =(initContainers):
                - securityContext:
                    runAsNonRoot: true
              containers:
                - securityContext:
                    runAsNonRoot: true

# ADR-0106 pod-security baseline: require runAsNonRoot (the clubhouse
# Deployment is the reference implementation — pod-level runAsNonRoot: true).
# LIVE and ENFORCED — see deploy/policies/README.md (enforcement matrix).
#
# Flipped Audit -> Enforce during the E1c cluster cutover (2026-07-16). The
# in-cluster PolicyReport background scan showed exactly two violator
# classes, both excluded narrowly below rather than fixed:
#   - monitoring/alloy-* — the Alloy DaemonSet tails host logs from
#     /var/log and functionally requires root (upstream chart default; the
#     observability values are outside the cutover lane's file boundary and
#     the root requirement would remain regardless — P2-2 follow-up).
#   - e1e-smoke — ephemeral E1e smoke fixtures (hashicorp/http-echo runs as
#     root); the namespace is recreated by every e1e smoke run (P2-5).
# Everything else (argocd, cert-manager, kyverno, kps, Loki, blackbox,
# rollouts, kaddy workloads) passes and is now admission-gated.
# Offline test: kyverno test tests/kyverno/require-run-as-nonroot/.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: require-run-as-nonroot
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-BASELINE
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must run as a non-root user: runAsNonRoot must be true
      either at the pod securityContext level or on every container, init
      container and ephemeral container.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - local-path-storage
          # Alloy tails host logs from /var/log and functionally requires
          # root (see header). Name+namespace-scoped: the rest of the
          # monitoring namespace stays enforced.
          - resources:
              namespaces:
                - monitoring
              names:
                - "alloy*"
          # Ephemeral E1e smoke fixtures (hashicorp/http-echo runs as root;
          # recreated by every e1e smoke run — P2-5 hygiene follow-up).
          - resources:
              namespaces:
                - e1e-smoke
      validate:
        message: >-
          Running as root is not allowed (ADR-0106). Set runAsNonRoot: true
          at the pod level, or on every (init/ephemeral) container.
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
              =(ephemeralContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
              =(initContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
              containers:
                - =(securityContext):
                    =(runAsNonRoot): true
          - spec:
              =(ephemeralContainers):
                - securityContext:
                    runAsNonRoot: true
              =(initContainers):
                - securityContext:
                    runAsNonRoot: true
              containers:
                - securityContext:
                    runAsNonRoot: true

# REQ-E1c-S03-02: Kyverno verifyImages policy — cosign signature verification
# for kaddy-published images.
#
# KEYLESS (SEC-8 landed as keyless, not a release key): kaddy's first
# self-published image (ghcr.io/platformrelay/kaddy-showcase) is signed in CI
# by .github/workflows/showcase-image.yaml via ambient GitHub OIDC — no
# long-lived signing key exists, so this attestor pins the WORKFLOW IDENTITY:
# Fulcio certificate issuer = GitHub Actions OIDC, subject = this repo's
# showcase-image workflow (any ref). Replaces the earlier placeholder public
# key that had no matching signer.
#
# STAYS Audit (operator-ratified): flip to Enforce only when (a) kaddy images
# are the only ghcr.io/platformrelay/* images deployed and (b) signing is
# proven by the workflow's own `cosign verify` step on main. See
# deploy/policies/README.md.
#
# NO OFFLINE TEST: `kyverno test` for verifyImages rules requires registry
# access to fetch signatures, so this policy is the one deliberate gap in
# tests/kyverno/ (documented in deploy/policies/README.md). In-cluster
# behaviour is REQ-E1c-S03-02's Chainsaw test
# `tests/chainsaw/security/unsigned-image-denied.yaml` (skip until the first
# signed image is deployed).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-signed-images
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: verify-signed-images
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-S03-02
    kaddy.io/status: keyless-attestor-audit-awaiting-first-ci-signed-deploy
    policies.kyverno.io/title: Verify kaddy image signatures
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      kaddy-published images must carry a valid keyless cosign signature from
      this repo's showcase-image GitHub Actions workflow (Fulcio cert:
      GitHub OIDC issuer + workflow identity subject). Third-party images are
      out of scope (they are pinned and Trivy-scanned instead — ADR-0106).
spec:
  validationFailureAction: Audit
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Ignore
  rules:
    - name: verify-kaddy-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/platformrelay/*"
          failureAction: Audit
          # Kyverno's policy-validation webhook requires mutateDigest: false
          # when failureAction is Audit (an Audit rule must not mutate the
          # image reference). Found on the first live sync — the offline
          # `kyverno test` CLI cannot evaluate verifyImages rules (D-024).
          mutateDigest: false
          attestors:
            - entries:
                - keyless:
                    # GitHub Actions ambient OIDC (keyless cosign in CI)
                    issuer: "https://token.actions.githubusercontent.com"
                    # Fulcio cert subject = the signing workflow's identity
                    # (any ref: refs/heads/main and refs/tags/v*)
                    subject: "https://github.com/PlatformRelay/Kaddy/.github/workflows/showcase-image.yaml@*"
                    rekor:
                      url: https://rekor.sigstore.dev

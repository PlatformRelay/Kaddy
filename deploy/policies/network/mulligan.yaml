# Audit F-01 (P1) default-deny baseline — `mulligan` namespace (mirrors
# network/gateway.yaml + network/websites.yaml).
#
# The mulligan namespace hosts the E7 progressive-delivery demos: two Argo
# Rollouts-managed nginx workloads (canary `app: mulligan`, blue/green
# `app: mulligan-bg`, both :8080), their Services (mulligan-stable/-canary,
# mulligan-bg-active/-preview) and a dedicated Cilium Gateway + HTTPRoute on
# mulligan.kaddy.local — public-facing, yet it had NO NetworkPolicy.
#
# Allowed paths (derived from the live manifests — deploy/workloads/mulligan/):
#   1. Cilium Gateway (Envoy) -> rollout pods :8080. Gateway API traffic
#      reaches the backends with the RESERVED IDENTITY `ingress` — only a CNP
#      can admit it (same constraint as allow-gateway-to-clubhouse/-websites).
#      Covers both Rollouts, incl. the blue/green preview Service backend.
#   2. DNS egress to kube-system CoreDNS :53 (baseline parity with the
#      sibling namespaces; the nginx demo pods initiate nothing else).
#
# Deliberately ABSENT (least privilege — no such flow exists):
#   - allow-prometheus-scrape: nothing scrapes mulligan pods. Rollout metrics
#     come from the argo-rollouts controller ServiceMonitor (rollouts ns) and
#     the AnalysisTemplate is a Rollouts-controller -> Prometheus EGRESS from
#     the argo-rollouts namespace, not a scrape into mulligan.
#   - allow-probe-egress-to-edge: no smoke/demo runs probe pods inside
#     mulligan (hack/demo/mulligan*.sh assert via the API server only).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: mulligan
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: default-deny-all
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/audit: F-01
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: mulligan
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: allow-dns-egress
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/audit: F-01
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Cilium-specific: admit Gateway API (Envoy) traffic to the mulligan rollout
# pods. The Envoy proxy carries the reserved `ingress` entity identity — not
# selectable by a K8s NetworkPolicy peer, so this must be a CNP. Selects the
# two Rollout pod sets explicitly (canary `app: mulligan`, blue/green
# `app: mulligan-bg`); Argo Rollouts preserves these template labels across
# revisions, so weight shifts and preview/active flips need no policy edits.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-mulligan
  namespace: mulligan
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: allow-gateway-to-mulligan
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/audit: F-01
spec:
  endpointSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - mulligan
          - mulligan-bg
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP

# REQ-E1d-S01-05/-06 + REQ-E3-S01-03 (ADR-0110): KSOPS generator — decrypts
# the SOPS-encrypted Secret manifests in deploy/secrets/ at kustomize render
# time. On the Argo CD repo-server the `ksops` binary (pinned, installed by
# the init container patch in deploy/bootstrap/) finds the age private key
# via SOPS_AGE_KEY_FILE -> the imperative `sops-age` Secret — the ONE root
# secret of the chain; everything downstream is encrypted in git.
#
# files are relative to this generator file's directory.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: identity-sops-secrets
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  # Dex GitHub OAuth app credentials -> Secret identity/dex-github-oauth
  - ../secrets/identity/dex-github.enc.yaml
  # Dex static-client secret for Argo CD -> Secret identity/dex-clients
  - ../secrets/identity/dex-clients.enc.yaml
  # Same client secret for the argocd-server side -> Secret argocd/argocd-oidc-client
  # (referenced from argocd-cm oidc.config as $argocd-oidc-client:clientSecret)
  - ../secrets/argocd/argocd-oidc-client.enc.yaml

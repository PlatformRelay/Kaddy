# REQ-E1d-S01-02 — expose the Dex issuer on the existing argocd Gateway.
#
# Attaches to the `https-dex` listener (SNI dex.kaddy.local, its own
# kaddy-local-ca Certificate — see deploy/bootstrap/argocd.yaml), which
# admits routes from exactly this namespace. The backendRef is same-namespace
# as the route, so no ReferenceGrant is needed. Loopback reachability rides
# the one host-mapped HTTPS port: https://dex.kaddy.local:30443 with
# `127.0.0.1 dex.kaddy.local` in /etc/hosts (operator) or curl --resolve
# (smoke tests).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
  namespace: identity
  labels:
    owner: platform-team
    service: identity
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: dex
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0107"
    kaddy.io/req: REQ-E1d-S01-02
spec:
  parentRefs:
    - name: argocd
      namespace: argocd
      sectionName: https-dex
  hostnames:
    - dex.kaddy.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dex
          port: 5556

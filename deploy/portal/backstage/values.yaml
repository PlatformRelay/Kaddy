# REQ-E10-S01-01 — Helm values for the Backstage chart (kaddy portal).
#
# NOT a Kubernetes manifest — Helm values for the backstage chart (pinned in
# deploy/apps-cloud/backstage-workload.yaml, the GSK chart-cutover App, which
# renders this file via a $values multi-source). deploy/apps/portal.yaml
# DIRECTORY-syncs deploy/portal (this file is directory.exclude'd there).
# NOT fed to kubeconform.
#
# LIVE CONTRACT: these values encode the canonical GSK env contract
# (deploy/portal/backstage/gsk/deployment-env.yaml) so the rendered Deployment
# matches the live out-of-band one and Argo can ADOPT it:
#   - NODE_ENV=production (guest backend module unload)
#   - AUTH_GITHUB_* / BACKEND_AUTH_SECRET envFrom Secrets backstage-github +
#     backstage-backend-auth (SOPS/live-created; never in git)
#   - args load EXACTLY two configs, override LAST:
#       --config app-config.yaml --config /cfg/app-config.override.yaml
#     (the baked app-config.production.yaml is NOT in the chain; the override
#     ConfigMap backstage-override — Argo-synced from gsk/app-config-override.
#     yaml — is self-sufficient for auth + app.extensions)
# Render-proven offline by tests/portal/chart-render-config-order.sh (R4-1).
#
# Image is PINNED (SEC-4, Renovate-trackable — see plugin-versions.md). The
# image is a CUSTOM Backstage build baking in the pinned TeraSky/community
# plugins (a stock backstage image cannot load them at runtime — plugins are
# compiled in). The APP SOURCE + Dockerfile live in the SEPARATE repo
# github.com/PlatformRelay/kaddy-portal (private); kaddy deploys exactly the
# image its CI builds + pushes.

# The live Deployment/Service are named `backstage` (hand-applied). Pin the
# chart fullname so Argo adopts the live objects instead of creating a
# `backstage-workload-*` sibling next to them.
fullnameOverride: backstage

backstage:
  image:
    registry: ghcr.io
    repository: platformrelay/kaddy-portal
    # Pinned tag — NO :latest (SEC-4). Renovate tracks ghcr.io/platformrelay/
    # kaddy-portal in renovate.json (customManagers / helm-values manager).
    # PIN POLICY: always pin the immutable per-commit `sha-<short>` tag that
    # kaddy-portal CI publishes — never `:latest`, never the mutable
    # `:<version>` tag. Record the digest here for audit. Bump deliberately,
    # with a chart-render-config-order run.
    # sha-8b74245 == v0.2.0
    # digest: sha256:0f84f62f48d649794da023940e58efddb349b80dcf745ecf4291bd7e43cee2bd
    tag: sha-8b74245
    pullPolicy: IfNotPresent

  # In-memory sqlite — a second replica would fork the catalog. Explicit pin.
  replicas: 1

  command: ['node', 'packages/backend']
  # CONFIG ORDER (security-load-bearing, see gsk/deployment-env.yaml): EXACTLY
  # these two files, override LAST. Backstage replaces ARRAYS with the later
  # file's value — only an override loaded last keeps the catalog-restricted
  # signIn.resolvers and `sign-in-page:app: false` authoritative over the
  # baked base config. Do NOT reintroduce extraAppConfig here: the chart
  # appends its --config entries AFTER these args, which would demote the
  # override from last place.
  args:
    - '--config'
    - 'app-config.yaml'
    - '--config'
    - '/cfg/app-config.override.yaml'

  # The GSK override ConfigMap (Argo-synced from gsk/app-config-override.yaml
  # by the deploy/apps/portal.yaml directory App — reused, never duplicated)
  # mounted at the exact live path /cfg/app-config.override.yaml.
  extraVolumes:
    - name: backstage-override
      configMap:
        name: backstage-override
  extraVolumeMounts:
    - name: backstage-override
      mountPath: /cfg
      readOnly: true

  # Live Deployment pods are labeled `app=backstage` — portal NetworkPolicies /
  # CNPs select that key (see rbac/networkpolicy.yaml). Set it explicitly so
  # the chart install stays reachable under default-deny; do NOT rely solely
  # on app.kubernetes.io/name (live pods may omit it).
  #
  # PLUS the seven ADR-0301 bare-key labels (live-proven values): the 2026-07-20
  # cutover sync was DENIED at admission by Kyverno require-kaddy-labels (and
  # restrict-data-classification fired on the absent key) because the chart
  # only labels pods with app.kubernetes.io/* — the bare keys must come from
  # podLabels. data-classification must stay in the closed vocabulary
  # (public|internal|confidential|restricted).
  podLabels:
    app: backstage
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    track: stable
    data-classification: internal
    business-criticality: business-operational

  # NODE_ENV=production is load-bearing: kaddy-portal loads the guest auth
  # backend module whenever NODE_ENV !== production (ConfigMap `guest: null`
  # alone cannot unload the module).
  #
  # ARGOCD_URL + ARGOCD_AUTH_TOKEN are REQUIRED at startup: the baked
  # app-config argocd/proxy schema substitutes both, and Backstage fails config
  # validation when either env is unset (live-proven pod carries exactly these
  # values). The token is a knowingly-unused lab placeholder — NOT a credential
  # (the argocd plugin read path goes through the proxy with its own auth);
  # wiring a real scoped token is a separate backlog item.
  extraEnvVars:
    - name: NODE_ENV
      value: production
    - name: ARGOCD_URL
      value: https://argocd-server.argocd.svc.cluster.local
    - name: ARGOCD_AUTH_TOKEN
      value: unused-lab-token-e10s07

  # Exactly the live contract Secrets (gsk/deployment-env.yaml):
  #   backstage-github       -> AUTH_GITHUB_CLIENT_ID / AUTH_GITHUB_CLIENT_SECRET
  #   backstage-backend-auth -> BACKEND_AUTH_SECRET
  # The kind-era backstage-oidc / backstage-readonly-tokens refs are dropped:
  # Dex is unwired on GSK (override sets oidc: null) and envFrom on a missing
  # Secret hard-fails pod creation (CreateContainerConfigError).
  extraEnvVarsSecrets:
    - backstage-github
    - backstage-backend-auth

  # Pod security posture (Kyverno Enforce set: nonroot, no-privesc, seccomp).
  # Container SC mirrors the LIVE-PROVEN pod exactly:
  #   - readOnlyRootFilesystem: FALSE — Backstage writes at runtime (in-memory
  #     sqlite + tmp); the live pod runs writable-root. HONEST: flipping this
  #     to true (tmpfs mounts for the write paths) is hardening tracked as a
  #     separate backlog item, NOT smuggled into the cutover.
  #   - runAsNonRoot/runAsUser duplicated at container level (live spec pins
  #     them on the container too, not only the pod SC).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: ['ALL']

  # LIVE-PROVEN probes: ONLY a readinessProbe GET / on 7007 (initialDelay 20).
  # The chart defaults liveness/startup probes to /.backstage/health/v1/* —
  # UNPROVEN on the custom kaddy-portal image; rendering them would crash-loop
  # the adopted pod. Null them out until the health endpoints are verified
  # (separate hardening item, together with readOnlyRootFilesystem above).
  readinessProbe:
    httpGet:
      path: /
      port: 7007
    initialDelaySeconds: 20
  livenessProbe: null
  startupProbe: null

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi

# The read-path ServiceAccount is defined in rbac/read-only-rbac.yaml (bound to
# the read-only ClusterRole), NOT auto-created by the chart — pin it here so the
# backstage pod runs as it.
serviceAccount:
  create: false
  name: portal-read-only

# In-memory sqlite for the lab (single replica; a real deployment uses Postgres).
postgresql:
  enabled: false

# ServiceMonitor for the portal (kaddy observability stack scrapes /metrics).
metrics:
  serviceMonitor:
    enabled: true

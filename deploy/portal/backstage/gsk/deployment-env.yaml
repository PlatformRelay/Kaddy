# REQ-E10-S05 / GSK lab — Backstage Deployment env invariants (documented patch).
#
# The live `Deployment/backstage` is still out-of-band (hand-applied). The
# chart CUTOVER now exists in-repo: deploy/apps-cloud/backstage-workload.yaml
# (pinned backstage chart + deploy/portal/backstage/values.yaml, manual-sync,
# INERT until an operator applies + syncs it; render-proven against this
# contract by tests/portal/chart-render-config-order.sh). Until that first
# observed sync, this file remains the canonical env contract the live
# Deployment MUST match so Argo/operators do not reintroduce guest login:
#
#   - NODE_ENV=production — kaddy-portal loads the guest auth module whenever
#     NODE_ENV !== production (packages/backend/src/index.ts). ConfigMap
#     `guest: null` alone is not enough.
#   - AUTH_GITHUB_CLIENT_ID / AUTH_GITHUB_CLIENT_SECRET from Secret
#     `backstage-github` (SOPS: deploy/secrets/portal/backstage-github.enc.yaml).
#   - BACKEND_AUTH_SECRET from Secret `backstage-backend-auth` (already live).
#   - CONFIG ORDER (security- AND render-load-bearing): the ACTUAL live
#     container args load ONLY two config files, override LAST:
#       node packages/backend --config app-config.yaml \
#         --config /cfg/app-config.override.yaml
#     The image's baked `app-config.production.yaml` is NOT in the chain
#     (white-screen root cause 2026-07-20: its `sign-in-page:app: false`
#     extensions entry never applied, so the guest AND GitHub sign-in pages
#     both attached and frontend createApp threw). The override must therefore
#     be SELF-SUFFICIENT for everything production.yaml would have provided:
#     auth (resolvers, providers) AND app.extensions (full array — Backstage
#     replaces ARRAYS with the later file's value, so the override must restate
#     page:catalog and carry sign-in-page:app: false itself). "Override last"
#     also keeps the override's signIn.resolvers array authoritative over the
#     base app-config.yaml.
#     HONEST: the args live only in the out-of-band Deployment / kaddy-portal
#     image CMD — no in-repo k8s manifest declares them; this contract (asserted
#     by tests/portal/gsk-catalog-override.sh) is the in-repo pin. Removing the
#     baked dangerouslyAllowSignInWithoutUserInCatalog flag upstream in
#     kaddy-portal is tracked separately (out of scope).
#
# Apply with: kubectl -n portal patch deploy backstage --type strategic -p ...
# (or re-apply the live Deployment with these env entries). NOT synced by the
# directory App today (no kind:Deployment under deploy/portal) — selfHeal cannot
# reclobber it; this file stays the source of truth until the chart-cutover App
# (deploy/apps-cloud/backstage-workload.yaml) is synced and Argo owns the
# workload.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-gsk-env-contract
  namespace: portal
  labels:
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: backstage-gsk-env-contract
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0107"
    kaddy.io/req: REQ-E10-S05-01
data:
  contract.txt: |
    NODE_ENV=production
    CONFIG_ORDER=--config app-config.yaml --config /cfg/app-config.override.yaml (ACTUAL live chain; app-config.production.yaml is NOT loaded — the override must be self-sufficient for auth resolvers AND app.extensions, and must stay the LAST --config)
    AUTH_GITHUB_CLIENT_ID <- secret/backstage-github:AUTH_GITHUB_CLIENT_ID
    AUTH_GITHUB_CLIENT_SECRET <- secret/backstage-github:AUTH_GITHUB_CLIENT_SECRET
    BACKEND_AUTH_SECRET <- secret/backstage-backend-auth:BACKEND_AUTH_SECRET
    OAuth callback URL (GitHub OAuth App, ONE callback per app):
      https://portal.lab.platformrelay.dev/api/auth/github/handler/frame

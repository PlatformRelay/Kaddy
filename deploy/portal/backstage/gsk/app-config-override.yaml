# REQ-E10-S05 / GSK lab — Backstage app-config OVERRIDE (ConfigMap).
#
# Mounted by the live Deployment as `--config /cfg/app-config.override.yaml`
# (volume from ConfigMap `backstage-override`). Merged OVER the image's baked
# `app-config.yaml`.
#
# LIVE BUG (2026-07-20): the bootstrap override set an empty catalog.locations
# array which REPLACED the image's platform + example Template locations →
# Create → Templates empty, catalog entity count 0. It also kept the temporary
# LB bootstrap baseUrl after portal.lab went live (cookie/CORS skew). Guest
# permission checks ALLOW create; the wipe + NetPol :443 deny were the blockers.
#
# PATH NOTE: the image's baked locations use `../../catalog/...` which Backstage
# resolves from process cwd `/app` to `/catalog/...` (missing). This override
# MUST pin cwd-relative `./catalog/...` and `./examples/...` paths so file
# locations actually load under the GSK Deployment command.
#
# AUTH (operator ASAP): GitHub provider ONLY on GSK. Dex is not deployed on this
# cluster (no identity ns / dex.platformrelay.dev unreachable from lab), so OIDC
# must be deleted (`oidc: null`). Sign-in is CATALOG-RESTRICTED: the
# usernameMatchingUserEntityName resolver only admits GitHub logins that exist
# as catalog User entities (allowlist: gsk/org-users.yaml, ingested via url
# location). Guest must be deleted (`guest: null`) AND the
# Deployment must run NODE_ENV=production — the kaddy-portal image loads the
# guest backend module whenever NODE_ENV !== production (config merge alone
# cannot unload the module). Secrets: AUTH_GITHUB_* from Secret `backstage-github`
# (env-expanded; never commit plaintext).
#
# Secrets: backend auth key is env-expanded from Deployment env
# BACKEND_AUTH_SECRET (Secret `backstage-backend-auth` on the cluster — never
# commit the value).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-override
  namespace: portal
  labels:
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: backstage-override
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0107"
    kaddy.io/req: REQ-E10-S05-01
data:
  app-config.override.yaml: |
    app:
      baseUrl: https://portal.lab.platformrelay.dev
      extensions:
        # Full array — Backstage config merge REPLACES arrays, so this must
        # include the base entries too. page:catalog keeps catalog as the root
        # page (mirrors the baked base app-config.yaml).
        - page:catalog:
            config:
              path: /
        # Disable the default guest sign-in page; the image compiles the GitHub
        # page at sign-in-page:app/github (kaddy-portal
        # packages/app/src/modules/signin) and requires the default to be
        # config-disabled (see that module's comment). The baked
        # app-config.production.yaml does this, but the live --config chain
        # does NOT load it — without this line BOTH sign-in-page extensions
        # attach, frontend createApp throws, and portal.lab white-screens.
        - sign-in-page:app: false
    backend:
      baseUrl: https://portal.lab.platformrelay.dev
      listen: ':7007'
      cors:
        origin: https://portal.lab.platformrelay.dev
      auth:
        keys:
          - secret: ${BACKEND_AUTH_SECRET}
      database:
        client: better-sqlite3
        connection: ':memory:'
    auth:
      # GitHub-only on GSK. guest + oidc deleted via null (merge).
      environment: production
      providers:
        guest: null
        oidc: null
        github:
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                # Catalog-restricted sign-in: this resolver ONLY admits GitHub
                # logins that exist as catalog User entities (org-users.yaml
                # url location below). No escape hatch: classic OAuth Apps
                # cannot restrict by org, so any relaxation here opens the
                # scaffolder/register surface to EVERY GitHub account.
                - resolver: usernameMatchingUserEntityName
      # Declarative-only: the actual sign-in page is compiled into the
      # kaddy-portal frontend (packages/app SignInPage). This key documents
      # intent / keeps config-driven consumers honest but cannot switch the
      # rendered page by itself.
      signInPage: github
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: gsk
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              skipTLSVerify: true
    # Explicit locations (cwd=/app). Do NOT use an empty locations array — that
    # wipe was the Create→Templates empty-catalog root cause. Do NOT use the
    # image's ../../ relative targets either (they resolve to /catalog/... and
    # miss the files under /app/catalog and /app/examples).
    catalog:
      # Global rules trimmed to the Backstage DEFAULT kinds (F3): runtime
      # registration (Register Existing / scaffolder) can only create these.
      # Group/Template/User are granted per-location below (location rules are
      # ADDITIVE to this global set), so no static location loses entities:
      #   kaddy-platform.yaml -> +Group; template.yaml -> +Template;
      #   org.yaml -> +Group; org-users.yaml url -> +User,+Group;
      #   entities.yaml ships only System/Component/API (verified in the
      #   kaddy-portal image sources) — covered by the defaults.
      rules:
        - allow: [Component, System, API, Resource, Location]
      locations:
        - type: file
          target: ./catalog/kaddy-platform.yaml
          rules:
            - allow: [Component, System, Group]
        - type: file
          target: ./examples/entities.yaml
        - type: file
          target: ./examples/template/template.yaml
          rules:
            - allow: [Template]
        - type: file
          # Group only — the example org.yaml ships a `guest` User which the
          # catalog-restricted resolver would otherwise admit (the GitHub
          # account named "guest" could sign in).
          target: ./examples/org.yaml
          rules:
            - allow: [Group]
        - type: url
          # Sign-in allowlist (User entities; see gsk/org-users.yaml). The
          # image is immutable, so this repo file rides its raw URL (public
          # repo — no token). 404s until the lane merges to main; other
          # locations still load meanwhile.
          target: https://raw.githubusercontent.com/PlatformRelay/Kaddy/main/deploy/portal/backstage/gsk/org-users.yaml
          rules:
            - allow: [User, Group]

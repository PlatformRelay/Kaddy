# REQ-E5-S05-01 / REQ-E5-S08-01 — kaddy marshal Grafana dashboard AS CODE.
#
# Provisioned by the kube-prometheus-stack Grafana dashboard sidecar, which
# watches ConfigMaps labelled grafana_dashboard=1 in ns monitoring (sidecar is
# enabled in deploy/observability/kube-prometheus-stack.yaml). Dashboard UID is
# pinned to `kaddy-marshal` (asserted by tests/smoke/e5-s05-01.sh via the
# Grafana API). Panels (operator request 2026-07-16): clubhouse probe
# status/latency, gateway/edge traffic, rollouts state, Prometheus/Alertmanager
# health, and live marshal alert state.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kaddy-marshal-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    owner: platform-team
    service: monitoring
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: kaddy-marshal-dashboard
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: monitoring
data:
  kaddy-marshal.json: |-
    {
      "uid": "kaddy-marshal",
      "title": "Kaddy Marshal — Edge & Clubhouse",
      "tags": ["kaddy", "marshal", "e5"],
      "timezone": "browser",
      "schemaVersion": 39,
      "editable": false,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Clubhouse probe",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "min(probe_success{job=\"blackbox\",service=\"clubhouse\"})", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Probe HTTP status",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "max(probe_http_status_code{job=\"blackbox\",service=\"clubhouse\"})", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 200 }, { "color": "red", "value": 300 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "TLS cert expiry (days)",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "(min(probe_ssl_earliest_cert_expiry{job=\"blackbox\",service=\"clubhouse\"}) - time()) / 86400", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "decimals": 0,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 21 }, { "color": "green", "value": 30 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Prometheus up",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "min(up{job=\"kps-prometheus\"})", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Alertmanager up",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "min(up{job=\"kps-alertmanager\"})", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Firing alerts",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Clubhouse probe duration (end-to-end via Gateway)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "probe_duration_seconds{job=\"blackbox\",service=\"clubhouse\"}", "legendFormat": "total — {{site}}" },
            { "refId": "B", "expr": "sum by (phase) (probe_http_duration_seconds{job=\"blackbox\",service=\"clubhouse\"})", "legendFormat": "{{phase}}" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 0.5 } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Edge request rate by listener (Cilium Envoy)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "sum by (envoy_http_conn_manager_prefix) (rate(envoy_http_downstream_rq_total{job=\"cilium-envoy\",envoy_http_conn_manager_prefix=~\"listener-.*\"}[5m]))", "legendFormat": "{{envoy_http_conn_manager_prefix}}" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Edge responses by class (Cilium Envoy)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "sum by (envoy_response_code_class) (rate(envoy_http_downstream_rq_xx{job=\"cilium-envoy\",envoy_http_conn_manager_prefix=~\"listener-.*\"}[5m]))", "legendFormat": "{{envoy_response_code_class}}xx" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Rollouts replicas (mulligan canary / blue-green)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "rollout_info_replicas_available{job=\"argo-rollouts-metrics\"}", "legendFormat": "{{name}} available" },
            { "refId": "B", "expr": "rollout_info_replicas_desired{job=\"argo-rollouts-metrics\"}", "legendFormat": "{{name}} desired" }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "min": 0
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "stat",
          "title": "Rollout phase",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "rollout_info{job=\"argo-rollouts-metrics\"} == 1", "legendFormat": "{{name}}: {{phase}}", "instant": true }
          ],
          "options": { "textMode": "name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Marshal alert state (pending=orange band, firing=red band)",
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "max by (alertname, alertstate) (ALERTS{alertname=~\"Clubhouse.*|Edge.*\"})", "legendFormat": "{{alertname}} ({{alertstate}})" }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 30, "stacking": { "mode": "normal" } },
              "min": 0
            },
            "overrides": []
          }
        }
      ]
    }

# REQ-E5-S02-01 / S02-02 — blackbox Probe against the public gateway URL so that
# probe_success == 1 and probe_http_status_code == 200 for a healthy site.
# Cluster verification deferred. $HOST is templated by the GitOps overlay.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: caddy-gateway
  namespace: monitoring
  labels:
    owner: platform-team
    service: caddy
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: gateway
spec:
  jobName: blackbox
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc:9115
  targets:
    staticConfig:
      static:
        - https://kaddy.example.com/
      labels:
        service: caddy
        part-of: kaddy

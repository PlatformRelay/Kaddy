# REQ-E5-S01-02 (re-pointed) — scrape the Argo Rollouts controller metrics.
#
# argo-rollouts/argo-rollouts-metrics exposes rollout_info* gauges (phase,
# desired/available replicas per Rollout) which feed the kaddy-marshal Grafana
# dashboard rollouts panels (E7 mulligan canary/blue-green visibility).
# job label = Service name: argo-rollouts-metrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argo-rollouts
  namespace: monitoring
  labels:
    owner: platform-team
    service: rollouts
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: argo-rollouts
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-rollouts-metrics
  namespaceSelector:
    matchNames:
      - argo-rollouts
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s

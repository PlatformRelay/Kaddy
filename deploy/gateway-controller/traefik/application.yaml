# E1g-S05b — Traefik as the Gateway API controller on the gridscale GSK
# cloud-edge (CLOUD-ONLY — proven live 2026-07-18; NOT applied on kind).
#
# WHY A SEPARATE, UNREFERENCED DIRECTORY (not a child under deploy/apps/):
#   deploy/apps/root.yaml directory-syncs deploy/apps/ with recurse:true, so
#   EVERY *.yaml there becomes a live child Application on the local kind cluster.
#   The kind path serves Gateway API through GSK-absent Cilium's built-in
#   `cilium` GatewayClass (installed at bootstrap by E1e) — installing a SECOND
#   gateway controller (Traefik) on kind would double-own the GatewayClass edge
#   and fight for the same routes. So this Application lives OUTSIDE the kind
#   app-of-apps root and is applied ONLY on the GSK cloud-edge (see the dir
#   README + hack/gsk/edge-up.sh). It is a real, replayable GitOps artifact — it
#   is just wired in on the cloud edge, not on kind.
#
# WHY TRAEFIK, NOT CILIUM, ON GSK (D-042): GSK ships a managed Cilium
# (v1.15.1, kube-proxy-replacement=false, no cilium-operator) that CANNOT serve
# Gateway API — the committed `gatewayClassName: cilium` edge is dead on GSK. A
# self-contained Gateway API controller is required; the operator chose Traefik
# v3.x. Traefik's chart creates the `traefik` GatewayClass itself (via
# providers.kubernetesGateway.enabled), so this repo does NOT hand-author a
# GatewayClass object (that would double-own the Helm-managed one and conflict on
# apply).
#
# PREREQUISITE — Gateway API CRDs (v1.5.1 standard channel) must exist FIRST,
# with the k8s-1.31-only isIP/isCIDR/isURL CEL rules stripped so they apply on
# GSK's k8s 1.30 (see hack/gsk/apply-gatewayapi-crds.sh). Traefik 3.7.6 watches
# TLSRoute + BackendTLSPolicy at v1 unconditionally; a stale v1alpha2 tlsroutes
# CRD blocks WaitForCacheSync and stops all reconciliation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-controller-traefik
  namespace: argocd
  labels:
    owner: platform-team
    service: gateway-controller
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: gateway-controller-traefik
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05b
    kaddy.io/status: cloud-only-gsk-edge
spec:
  # Dedicated closed-list cloud-edge project (deploy/apps/projects/gsk-cloud-edge.yaml)
  # — the `platform` project permits neither ns `traefik`, the traefik Helm repo,
  # nor the cluster-scoped GatewayClass the chart creates, so this App must use
  # its own project or it would self-deny on sync.
  project: gsk-cloud-edge
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    # app v3.7.6 — proven live on GSK 2026-07-18. No floating tag.
    targetRevision: 41.0.2
    helm:
      releaseName: traefik
      valuesObject:
        providers:
          # The Gateway API provider — creates the `traefik` GatewayClass and
          # reconciles Gateway/HTTPRoute. experimentalChannel stays OFF: the
          # standard channel (v1 HTTPRoute/Gateway) is all the demo needs.
          kubernetesGateway:
            enabled: true
            experimentalChannel: false
          # No classic Ingress — Gateway API only.
          kubernetesIngress:
            enabled: false
        # Chart still defaults to minting IngressClass `traefik`. That is
        # cluster-scoped and not on the gsk-cloud-edge AppProject whitelist
        # (Gateway API only). Disable so Argo sync succeeds without widening
        # the project ACL; keep any pre-existing IngressClass on the cluster.
        ingressClass:
          enabled: false
        # Do NOT let the chart mint its own Gateway; the clubhouse Gateway +
        # listeners are owned as GitOps manifests (deploy/gateway/cloud-only/).
        gateway:
          enabled: false
        # GSK has a working service-LoadBalancer CCM: type=LoadBalancer
        # auto-provisions a gridscale loadbalancer + public IP (proven:
        # 185.241.34.187). No manual NodePort/LBaaS wiring — collapses S05c/S05d.
        service:
          type: LoadBalancer
        deployment:
          replicas: 1
        # Entrypoints stay at the chart DEFAULTS (web:8000 / websecure:8443).
        # Do NOT rebind privileged 80/443 in-container — NET_BIND_SERVICE crashes
        # on GSK. The LoadBalancer Service maps external 80->8000 / 443->8443, so
        # the Gateway HTTPS listeners MUST use port 8443 (Traefik matches a
        # listener to the ENTRYPOINT port, not the Service port).
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    # selfHeal OFF — this controller fronts all live edge traffic; keep a human
    # in the loop for drift (matches the gateway/observability children).
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

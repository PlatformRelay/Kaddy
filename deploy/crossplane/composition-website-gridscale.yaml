# REQ-E6g-S03-01 — gridscale VM variant of the Website Composition.
#
# A Website with spec.variant=gridscale (and the matching compositionSelector
# label) provisions a REAL gridscale nginx VM instead of an in-cluster
# Deployment. This is a SEPARATE Composition from composition-website.yaml —
# the in-cluster path is untouched (function-patch-and-transform has no
# conditional resource emission, so a single shared composition would provision
# a VM for EVERY Website, including putting-green; splitting keeps the E6 path
# safe). Selection: spec.compositionSelector.matchLabels
# ['platform.kaddy.io/variant']=gridscale on the XR.
#
# The composed graph is the minimal bootable gridscale server (cost-sensitive):
#   Network   an L2 private network provisioned alongside (private/east-west
#             tier); the VM SERVES on the gridscale Public Network NIC (below)
#   IPv4      one public IPv4 (the /legacy edge target in the live cycle)
#   Storage   one small storage from an Ubuntu template (the boot disk)
#   Server    1 core / 1 GiB nginx VM; cloud-init (userDataBase64) installs
#             nginx, serves the sample page, and exposes /metrics (nginx
#             stub_status) — mirrors deploy/workloads/caddy-mvp/configmap-nginx
#             (single source of truth for the page+metrics contract).
#
# ADR-0301 identity labels are propagated XR -> every composed MR (kubectl/API
# audit trail). managed-by is stamped `crossplane`.
#
# All MRs use the namespaced (m.platformrelay.io) provider variant to match the
# Crossplane v2 NAMESPACED Website XR (D-027).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: website-gridscale.platform.kaddy.io
  labels:
    owner: platform-team
    service: website-api
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: website-gridscale.platform.kaddy.io
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
    # Selector: a Website with spec.compositionSelector.matchLabels
    # ['platform.kaddy.io/variant']=gridscale resolves THIS composition.
    platform.kaddy.io/variant: gridscale
  annotations:
    kaddy.io/adr: "0105"
    kaddy.io/req: REQ-E6g-S03-01
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  compositeTypeRef:
    apiVersion: platform.kaddy.io/v1alpha1
    kind: Website
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        patchSets:
          # Composed MRs named after the XR (stable, demo-friendly).
          - name: xr-name
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
          # ADR-0301 identity labels propagated XR -> composed MR.
          - name: adr0301-labels
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['owner']
                toFieldPath: metadata.labels['owner']
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['service']
                toFieldPath: metadata.labels['service']
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['part-of']
                toFieldPath: metadata.labels['part-of']
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['data-classification']
                toFieldPath: metadata.labels['data-classification']
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['business-criticality']
                toFieldPath: metadata.labels['business-criticality']
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels['track']
                toFieldPath: metadata.labels['track']
          # Selector label so the Server can objectUuidSelector its Network /
          # Storage / IPv4 siblings within this XR (matchLabels on a per-XR key).
          - name: composed-selector-label
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.labels['platform.kaddy.io/website']
        resources:
          # ------------------------------------------------------- network
          - name: network
            base:
              apiVersion: gridscale.gridscale.m.platformrelay.io/v1alpha1
              kind: Network
              metadata:
                labels:
                  managed-by: crossplane
              spec:
                forProvider:
                  name: kaddy-website
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - type: PatchSet
                patchSetName: xr-name
              - type: PatchSet
                patchSetName: adr0301-labels
              - type: PatchSet
                patchSetName: composed-selector-label
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-net"
            readinessChecks:
              - type: MatchCondition
                matchCondition:
                  type: Ready
                  status: "True"
          # ---------------------------------------------------------- ipv4
          - name: ipv4
            base:
              apiVersion: gridscale.gridscale.m.platformrelay.io/v1alpha1
              kind: IPv4
              metadata:
                labels:
                  managed-by: crossplane
              spec:
                forProvider:
                  name: kaddy-website
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - type: PatchSet
                patchSetName: xr-name
              - type: PatchSet
                patchSetName: adr0301-labels
              - type: PatchSet
                patchSetName: composed-selector-label
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-ip"
            readinessChecks:
              - type: MatchCondition
                matchCondition:
                  type: Ready
                  status: "True"
          # ------------------------------------------------------- storage
          # Boot disk from an Ubuntu template. templateUuid is a per-tenant
          # gridscale template UUID injected at live time (see runbook) — the
          # offline manifest carries a documented placeholder.
          - name: storage
            base:
              apiVersion: gridscale.gridscale.m.platformrelay.io/v1alpha1
              kind: Storage
              metadata:
                labels:
                  managed-by: crossplane
              spec:
                forProvider:
                  name: kaddy-website
                  # Smallest sensible boot disk (GiB) — cost guard.
                  capacity: 10
                  storageType: storage_high
                  template:
                    - hostname: kaddy-website
                      # TODO(live): set to the tenant's Ubuntu 22.04 template
                      # UUID (gscloud template list). Placeholder for offline.
                      templateUuid: REPLACE_ME_UBUNTU_TEMPLATE_UUID
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - type: PatchSet
                patchSetName: xr-name
              - type: PatchSet
                patchSetName: adr0301-labels
              - type: PatchSet
                patchSetName: composed-selector-label
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-disk"
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.template[0].hostname
            readinessChecks:
              - type: MatchCondition
                matchCondition:
                  type: Ready
                  status: "True"
          # -------------------------------------------------------- server
          # 1 core / 1 GiB nginx VM (cost guard). Boots the Storage disk,
          # attaches the Network NIC + public IPv4 (all selected by the per-XR
          # label). cloud-init (userDataBase64) installs nginx and serves the
          # sample page + /metrics — the page/metrics contract mirrors
          # deploy/workloads/caddy-mvp/configmap-nginx.yaml (single source).
          - name: server
            base:
              apiVersion: gridscale.gridscale.m.platformrelay.io/v1alpha1
              kind: Server
              metadata:
                labels:
                  managed-by: crossplane
              spec:
                forProvider:
                  name: kaddy-nginx-legacy
                  cores: 1
                  memory: 1
                  power: true
                  storage:
                    - objectUuidSelector:
                        matchControllerRef: true
                  ipv4Selector:
                    matchControllerRef: true
                  # SINGLE public NIC (live-proven serving topology). The public
                  # IPv4 only routes when the VM is on the gridscale Public Network;
                  # a private NIC alone leaves all ports filtered (E6g/E13). Attaching
                  # BOTH the public and the composed private NIC was live-shown to
                  # break serving (dual default-route ambiguity → the public IPv4
                  # stops routing), so the Server takes ONLY the public NIC. The
                  # composed Network below is provisioned as part of the graph and is
                  # available for a private/east-west tier; it is deliberately not the
                  # Server's default route. objectUuid = tenant/location Public Network
                  # UUID, injected at live time (runbook step 4).
                  network:
                    - objectUuid: REPLACE_ME_PUBLIC_NETWORK_UUID
                  # cloud-init (#cloud-config) — installs nginx, serves the
                  # sample page + /metrics (nginx stub_status). base64 per the
                  # gridscale Server schema (userDataBase64). Kept minimal;
                  # mirrors the caddy-mvp nginx page/metrics contract.
                  userDataBase64: 
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - type: PatchSet
                patchSetName: xr-name
              - type: PatchSet
                patchSetName: adr0301-labels
              - type: PatchSet
                patchSetName: composed-selector-label
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-nginx-legacy"
            readinessChecks:
              - type: MatchCondition
                matchCondition:
                  type: Ready
                  status: "True"

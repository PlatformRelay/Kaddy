---
# E1g-S05i — the FULL caddy-mvp Argo Rollouts canary on the cloud-edge
# (caddy.lab). Distinct from the caddy-demo landing page above (demo.lab).
#
# RESOURCE NAME: `caddy-lab` (NOT `caddy-mvp`). Kind's tenant HTTPRoute is also
# named `caddy-mvp` in ns `caddy-mvp` (local cilium Gateway + caddy-mvp.kaddy.local).
# Sharing that name caused Argo `workloads` to reclobber clubhouse parentRefs /
# hostnames within ~15s even with RespectIgnoreDifferences — durable fix is a
# distinct cloud-only name. Kind route is UNCHANGED.
#
# Parents clubhouse (ns traefik) / https-caddy → host caddy.lab.platformrelay.dev.
# Backends are the Rollouts Services caddy-origin-stable/canary (there is no
# Service named caddy-mvp in the tenant).
#
# The backendRef weights (stable 100 / canary 0) are the STABLE steady state;
# the Argo Rollouts Gateway API plugin (amd64 on GSK — see
# hack/gsk/rollouts-plugin-amd64.sh) mutates weights on the KIND route name
# referenced by Rollout/caddy-origin; cloud traffic here stays at steady weights
# unless a follow-up points the plugin at caddy-lab.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caddy-lab
  namespace: caddy-mvp
  labels:
    owner: platform-team
    service: caddy-mvp
    part-of: kaddy
    managed-by: edge-up
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy-lab
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: edge-up
  annotations:
    kaddy.io/req: REQ-E1g-S05i
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-caddy
  hostnames:
    - caddy.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: caddy-origin-stable
          port: 8080
          weight: 100
        - group: ""
          kind: Service
          name: caddy-origin-canary
          port: 8080
          weight: 0
---
# E10 portal — Backstage IDP on the cloud-edge (portal.lab).
#
# Backend is the standalone lab Service `backstage` (port 7007) in ns portal —
# the same Service the temporary Traefik IngressRoute
# `backstage.<LB-IP>.nip.io` targeted during E10-S07 bring-up. This HTTPRoute
# is the durable GitOps path (matches argocd/grafana/demo/caddy). Kind stays on
# portal.kaddy.local via the local-CA Certificate in deploy/portal/backstage/;
# this cloud route is applied only via edge-up.sh on GSK.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portal
  namespace: portal
  labels:
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E10-S01-01
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-portal
  hostnames:
    - portal.lab.platformrelay.dev
  rules:
    # Habit-proofing: operators keep typing /login, but Backstage has NO /login
    # route (when signed out its sign-in page renders at ANY path), so the bare
    # path serves Backstage's "dropped the mic" 404. 302 back to / instead.
    # Exact match (not PathPrefix) so a real future /login/* route is never
    # shadowed. Traefik v3.7 Gateway API standard channel supports
    # RequestRedirect; more-specific match wins over the PathPrefix / rule.
    - matches:
        - path:
            type: Exact
            value: /login
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: backstage
          port: 7007
          weight: 1

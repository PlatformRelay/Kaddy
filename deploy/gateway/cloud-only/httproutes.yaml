# E1g-S05e — app HTTPRoutes for the GSK cloud-edge (CLOUD-ONLY; live-extracted
# 2026-07-18; NOT applied on kind).
#
# Each route lives in its APP's namespace and attaches to the clubhouse Gateway's
# matching HTTPS listener by sectionName (the listener admits routes from All
# namespaces, so no ReferenceGrant is needed for the parent attach — the backend
# Service is in the same namespace as its route). One host each:
#   argocd.lab   -> argocd-server        (ns argocd)      port 80
#   grafana.lab  -> monitoring-grafana   (ns monitoring)  port 80
#   demo.lab     -> caddy                (ns caddy-demo)  port 80
#
# NOTE (argocd): argocd-server must run with server.insecure=true
# (argocd-cmd-params-cm) behind this TLS-terminating gateway, else it 307-loops
# HTTP->HTTPS. That is a runtime config on the argocd install, not a route field.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  labels:
    owner: platform-team
    service: argocd
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-argocd
  hostnames:
    - argocd.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    owner: platform-team
    service: grafana
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-grafana
  hostnames:
    - grafana.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: monitoring-grafana
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caddy-demo
  namespace: caddy-demo
  labels:
    owner: platform-team
    service: caddy-demo
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy-demo
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-demo
  hostnames:
    - demo.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: caddy
          port: 80
          weight: 1
---
# E1g-S05i — the FULL caddy-mvp Argo Rollouts canary on the cloud-edge
# (caddy.lab). Distinct from the caddy-demo landing page above (demo.lab).
#
# NAME/NS COLLISION NOTE: this route is name `caddy-mvp` in ns `caddy-mvp` — the
# SAME name+ns as deploy/workloads/caddy-mvp/httproute.yaml. That kind route
# parents the LOCAL cilium Gateway (`caddy-mvp`/`https`, host caddy-mvp.kaddy.local)
# and is UNCHANGED here. This cloud route parents the `clubhouse` Gateway
# (ns traefik) by sectionName `https-caddy`, host caddy.lab.platformrelay.dev.
# They never coexist on one cluster: the kind route ships via the `workloads`
# ArgoCD App (kind only); this cloud route is applied imperatively via
# edge-up.sh on the GSK edge (which runs NO ArgoCD Applications — verified
# 2026-07-18), so there is no controller fighting over the object.
#
# The backendRef weights (stable 100 / canary 0) are the STABLE steady state;
# the Argo Rollouts Gateway API plugin (amd64 on GSK — see
# hack/gsk/rollouts-plugin-amd64.sh) mutates them live during a caddy-origin
# canary. Because the edge is imperative (no ArgoCD sync), the mutated weights
# simply persist — no ignoreDifferences needed here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caddy-mvp
  namespace: caddy-mvp
  labels:
    owner: platform-team
    service: caddy-mvp
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy-mvp
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05i
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-caddy
  hostnames:
    - caddy.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: caddy-origin-stable
          port: 8080
          weight: 100
        - group: ""
          kind: Service
          name: caddy-origin-canary
          port: 8080
          weight: 0

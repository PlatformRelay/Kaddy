---
# E1g-S05i — the FULL caddy-mvp Argo Rollouts canary on the cloud-edge
# (caddy.lab). Distinct from the caddy-demo landing page above (demo.lab).
#
# NAME/NS COLLISION NOTE: this route is name `caddy-mvp` in ns `caddy-mvp` — the
# SAME name+ns as deploy/workloads/caddy-mvp/httproute.yaml. That kind route
# parents the LOCAL cilium Gateway (`caddy-mvp`/`https`, host caddy-mvp.kaddy.local)
# and is UNCHANGED here. This cloud route parents the `clubhouse` Gateway
# (ns traefik) by sectionName `https-caddy`, host caddy.lab.platformrelay.dev.
#
# COEXISTENCE (updated 2026-07-20): Argo CD Applications DO run on GSK now. The
# `workloads` App auto-syncs the kind HTTPRoute over this object (same name/ns)
# unless `ignoreDifferences` covers `.spec.parentRefs` + `.spec.hostnames`
# (see deploy/apps/workloads.yaml). After enabling those ignores, re-apply this
# file via edge-up.sh / `kubectl apply -f deploy/gateway/cloud-only/` so
# caddy.lab attaches to clubhouse again.
#
# The backendRef weights (stable 100 / canary 0) are the STABLE steady state;
# the Argo Rollouts Gateway API plugin (amd64 on GSK — see
# hack/gsk/rollouts-plugin-amd64.sh) mutates them live during a caddy-origin
# canary. Weight diffs are also ignoreDifferences'd on the workloads App.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caddy-mvp
  namespace: caddy-mvp
  labels:
    owner: platform-team
    service: caddy-mvp
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy-mvp
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05i
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-caddy
  hostnames:
    - caddy.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: caddy-origin-stable
          port: 8080
          weight: 100
        - group: ""
          kind: Service
          name: caddy-origin-canary
          port: 8080
          weight: 0
---
# E10 portal — Backstage IDP on the cloud-edge (portal.lab).
#
# Backend is the standalone lab Service `backstage` (port 7007) in ns portal —
# the same Service the temporary Traefik IngressRoute
# `backstage.<LB-IP>.nip.io` targeted during E10-S07 bring-up. This HTTPRoute
# is the durable GitOps path (matches argocd/grafana/demo/caddy). Kind stays on
# portal.kaddy.local via the local-CA Certificate in deploy/portal/backstage/;
# this cloud route is applied only via edge-up.sh on GSK.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portal
  namespace: portal
  labels:
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E10-S01-01
    kaddy.io/status: cloud-only-gsk-edge
spec:
  parentRefs:
    - name: clubhouse
      namespace: traefik
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-portal
  hostnames:
    - portal.lab.platformrelay.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: backstage
          port: 7007
          weight: 1

# E1g-S05e/S05f — per-host Let's Encrypt Certificates for the GSK cloud-edge
# (CLOUD-ONLY; live-extracted 2026-07-18; NOT applied on kind).
#
# One Certificate per demo host, issued by the DNS-01 PROD ClusterIssuer
# (deploy/cert-manager/cloud-only/cluster-issuer-dns01-prod.yaml). cert-manager
# writes each keypair into a Secret in THIS (traefik) namespace — the same ns as
# the clubhouse Gateway, so its listener certificateRefs resolve. Proven live:
# argocd/grafana/demo/caddy reached Ready=True (2026-07-18); portal.lab added
# for the E10 Backstage IDP (same issuer + pattern).
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: traefik
  labels:
    owner: platform-team
    service: argocd
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: argocd-tls
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  secretName: argocd-tls
  dnsNames:
    - argocd.lab.platformrelay.dev
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: traefik
  labels:
    owner: platform-team
    service: grafana
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: grafana-tls
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  secretName: grafana-tls
  dnsNames:
    - grafana.lab.platformrelay.dev
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-tls
  namespace: traefik
  labels:
    owner: platform-team
    service: caddy-demo
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: demo-tls
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05e
    kaddy.io/status: cloud-only-gsk-edge
spec:
  secretName: demo-tls
  dnsNames:
    - demo.lab.platformrelay.dev
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io
---
# E1g-S05i — cert for the caddy-mvp Argo Rollouts canary tenant (caddy.lab).
# Same DNS-01 PROD issuer; keypair Secret `caddy-tls` in ns traefik resolves the
# clubhouse `https-caddy` listener. Proven live 2026-07-18: Ready=True, chain
# verifies without -k (notAfter 2026-10-16).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: caddy-tls
  namespace: traefik
  labels:
    owner: platform-team
    service: caddy-mvp
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy-tls
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E1g-S05i
    kaddy.io/status: cloud-only-gsk-edge
spec:
  secretName: caddy-tls
  dnsNames:
    - caddy.lab.platformrelay.dev
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io
---
# E10 portal — cert for the Backstage IDP on the cloud-edge (portal.lab).
# Same DNS-01 PROD issuer; keypair Secret `portal-tls` in ns traefik resolves the
# clubhouse `https-portal` listener. Distinct from the kind-only Certificate of
# the same name in ns portal (kaddy-local-ca, portal.kaddy.local) — different
# namespace, never coexist on one cluster path (cloud-only vs kind App recurse:false).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: portal-tls
  namespace: traefik
  labels:
    owner: platform-team
    service: portal
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: portal-tls
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-E10-S01-01
    kaddy.io/status: cloud-only-gsk-edge
spec:
  secretName: portal-tls
  dnsNames:
    - portal.lab.platformrelay.dev
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io

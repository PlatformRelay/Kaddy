# REQ-E4-S02-01 — HTTPRoute: / -> clubhouse Service (:8080) on the HTTPS listener.
#
# Attached to the platform `clubhouse` Gateway's `https` listener via sectionName.
# backendRef resolves in this namespace (gateway) — the clubhouse Service is
# co-located, so no ReferenceGrant is required.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clubhouse
  namespace: gateway
  labels:
    owner: platform-team
    service: clubhouse
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: clubhouse
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  parentRefs:
    - name: clubhouse
      sectionName: https
  hostnames:
    - clubhouse.kaddy.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: clubhouse
          port: 8080

# REQ-E4-S03-03 (optional/should) — HTTP -> HTTPS redirect.
#
# Attached to the platform Gateway's `http` listener; issues a 301 to the https
# scheme so plain-HTTP callers are bounced to TLS. Asserted by
# tests/smoke/e4-s03-03.sh.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clubhouse-redirect
  namespace: gateway
  labels:
    owner: platform-team
    service: clubhouse
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: clubhouse
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  parentRefs:
    - name: clubhouse
      sectionName: http
  hostnames:
    - clubhouse.kaddy.local
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

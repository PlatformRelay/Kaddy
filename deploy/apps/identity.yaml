# REQ-E3-S01-01 + REQ-E1d-* : identity child Application — LIVE (E1d).
#
# The KSOPS deferral is resolved: the repo-server renders deploy/identity
# with `kustomize --enable-alpha-plugins --enable-exec` (argocd-cm
# kustomize.buildOptions) and the ksops generator decrypts
# deploy/secrets/{identity,argocd}/*.enc.yaml at build time (ADR-0110,
# REQ-E3-S01-03). Prerequisite on a fresh cluster: `task bootstrap:e1d`
# (age-key root secret + repo-server plugin) — without it this app degrades
# to a render error, never to plaintext-in-git.
#
# prune+selfHeal ON like the other platform children; the namespace is a
# tracked manifest (deploy/identity/namespace.yaml), not CreateNamespace.
# The argocd-oidc-client Secret intentionally lands in the argocd namespace
# (allowed destination of the platform project) — argocd-cm oidc.config
# references it as $argocd-oidc-client:clientSecret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity
  namespace: argocd
  labels:
    owner: platform-team
    service: identity
    part-of: kaddy
    managed-by: argocd
    data-classification: confidential
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0107"
    kaddy.io/req: REQ-E1d-S01-01
spec:
  project: platform
  source:
    repoURL: https://github.com/PlatformRelay/Kaddy.git
    targetRevision: main
    path: deploy/identity
  destination:
    server: https://kubernetes.default.svc
    namespace: identity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

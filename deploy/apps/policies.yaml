# E1c: policies child Application — syncs deploy/policies/ (Kyverno
# ClusterPolicies + the default-deny NetworkPolicy baseline).
#
# Automated sync ON (D-046): NetPol + ClusterPolicies are on main and
# already live-proven; keeping this app manual caused drift vs Git and
# blocked GitOps delivery of selector/NetPol fixes. selfHeal OFF (same
# blast-radius exception as kyverno/rollouts — human in the loop before
# Argo forcibly reverts admission/network drift). Runbook + enforcement
# matrix: deploy/policies/README.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policies
  namespace: argocd
  labels:
    owner: platform-team
    service: policies
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: policies
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-S01-01
    kaddy.io/status: live-autosync
spec:
  project: platform
  source:
    repoURL: https://github.com/PlatformRelay/Kaddy.git
    targetRevision: main
    path: deploy/policies
    directory:
      # recurse ON: kyverno/ and network/ subdirectories.
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # ClusterPolicies are cluster-scoped and every NetworkPolicy pins its own
    # namespace; `kyverno` is only the default for any un-namespaced
    # namespaced resource (there are none today).
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false

# REQ-E3-S01-01: workloads child Application (placeholder wiring).
#
# Home for the demoable sample apps (Caddy/nginx MVP variants, clubhouse) once
# they are scaffolded. Points at an empty-but-tracked directory today so the
# app-of-apps set is complete; selfHeal OFF (workloads may be Rollouts-managed in
# E7, which needs ignoreDifferences on HTTPRoute weights — human in the loop).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads
  namespace: argocd
  labels:
    owner: platform-team
    service: workloads
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: workloads
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  project: workloads
  source:
    repoURL: https://github.com/PlatformRelay/Kaddy.git
    targetRevision: main
    path: deploy/workloads
    directory:
      # recurse ON so Argo descends into per-workload subdirs (deploy/workloads/
      # clubhouse/, and future tenants). recurse:true is non-default so Argo keeps
      # it (unlike recurse:false, which it normalises away → perpetual OutOfSync).
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # REQ-E7-S02-01 (ADR-0103) — the Argo Rollouts Gateway API plugin mutates the
  # mulligan HTTPRoute backend weights during a canary. Ignore those fields so
  # Argo CD does not fight the controller (weight lives in an array, so a
  # jqPathExpression is required — a JSON pointer can't target array elements).
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mulligan
      namespace: mulligan
      jqPathExpressions:
        - .spec.rules[].backendRefs[].weight
    # REQ-CADDY-S02-02 — caddy-origin canary mutates tenant HTTPRoute weights.
    # E1g GSK: same name/ns as deploy/gateway/cloud-only/httproutes.yaml. When the
    # workloads App auto-syncs on GSK it would overwrite clubhouse/https-caddy +
    # caddy.lab with the kind parents (caddy-mvp Gateway + caddy-mvp.kaddy.local)
    # → Traefik 404 on https://caddy.lab.platformrelay.dev/. Ignore parentRefs +
    # hostnames so edge-up / live re-apply of the cloud route survives sync.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: caddy-mvp
      namespace: caddy-mvp
      jqPathExpressions:
        - .spec.rules[].backendRefs[].weight
        - .spec.parentRefs
        - .spec.hostnames
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      # Required for ignoreDifferences to apply at sync time (not only for
      # OutOfSync detection). Without this, Argo still overwrites live
      # parentRefs/hostnames on the caddy-mvp HTTPRoute during sync.
      - RespectIgnoreDifferences=true

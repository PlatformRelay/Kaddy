# E1c AppProject hardening (security review P1-2 / SEC-11): restricted
# project for demoable workloads and the edge. WIRED by the
# cluster-hardening cutover — see platform.yaml header (root recurses
# deploy/apps/; bootstrap:e3 applies projects first).
#
# Members: gateway (edge: Gateway/HTTPRoutes) and workloads (clubhouse in
# ns gateway + the mulligan Rollouts demo in ns mulligan). Namespace-scoped
# only — the single cluster-scoped grant is Namespace creation
# (CreateNamespace).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workloads
  namespace: argocd
  labels:
    owner: platform-team
    service: workloads
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: workloads
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-APPPROJECT
spec:
  description: >-
    kaddy sample workloads and the gateway edge (clubhouse, Caddy/nginx MVP
    variants, future Rollouts-managed tenants). Namespace-scoped blast
    radius; no cluster resources beyond Namespace.
  sourceRepos:
    - https://github.com/PlatformRelay/Kaddy.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: gateway
    - server: https://kubernetes.default.svc
      namespace: default
    - server: https://kubernetes.default.svc
      namespace: apps
    # The workloads app deploys the mulligan blue/green + canary Rollouts
    # demo (deploy/workloads/mulligan/) into its own namespace:
    - server: https://kubernetes.default.svc
      namespace: mulligan
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

# E1c AppProject hardening (security review P1-2 / SEC-11): restricted
# project for the platform control plane. WIRED by the cluster-hardening
# cutover: the root Application syncs deploy/apps/ with recurse ON, so this
# projects/ subdirectory is GitOps-managed; `task bootstrap:e3` also applies
# it directly (first-boot ordering: projects must exist before any child
# Application referencing them).
#
# Members: root (app-of-apps), platform-core (ClusterIssuers), policies
# (Kyverno ClusterPolicies + NetworkPolicies), kyverno (the admission
# engine, vendored install), rollouts (Argo Rollouts controller, vendored
# install), identity (deferred).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    owner: platform-team
    service: platform
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: platform
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-APPPROJECT
spec:
  description: >-
    kaddy platform control plane: app-of-apps root, cert-manager issuers,
    admission/network policies, identity. Source of truth is this repo only.
  sourceRepos:
    - https://github.com/PlatformRelay/Kaddy.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: kyverno
    - server: https://kubernetes.default.svc
      namespace: identity
    # The policies app places NetworkPolicies into these namespaces:
    - server: https://kubernetes.default.svc
      namespace: gateway
    - server: https://kubernetes.default.svc
      namespace: monitoring
    # The rollouts app (vendored Argo Rollouts controller install):
    - server: https://kubernetes.default.svc
      namespace: argo-rollouts
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: kyverno.io
      kind: ClusterPolicy
    # The vendored controller installs (kyverno, rollouts) carry CRDs and
    # cluster RBAC; still a closed list, not */*.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

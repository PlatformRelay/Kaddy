# E1c AppProject hardening (security review P1-2 / SEC-11): restricted
# project for the platform control plane. WIRED by the cluster-hardening
# cutover: the root Application syncs deploy/apps/ with recurse ON, so this
# projects/ subdirectory is GitOps-managed; `task bootstrap:e3` also applies
# it directly (first-boot ordering: projects must exist before any child
# Application referencing them).
#
# Members: root (app-of-apps), platform-core (ClusterIssuers), policies
# (Kyverno ClusterPolicies + NetworkPolicies), kyverno (the admission
# engine, vendored install), rollouts (Argo Rollouts controller, vendored
# install), crossplane + crossplane-core (E6: Crossplane v2 + the Website
# XRD/Composition platform API), identity (deferred).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    owner: platform-team
    service: platform
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: platform
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-APPPROJECT
spec:
  description: >-
    kaddy platform control plane: app-of-apps root, cert-manager issuers,
    admission/network policies, identity. Source of truth is this repo only.
  sourceRepos:
    - https://github.com/PlatformRelay/Kaddy.git
    # E6: the crossplane-core grandchild Application pulls the pinned Crossplane
    # chart from the upstream Helm repo (nested-Helm-app pattern; the list
    # stays closed — one repo, one chart, exact version pin).
    - https://charts.crossplane.io/stable
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: kyverno
    - server: https://kubernetes.default.svc
      namespace: identity
    # The policies app places NetworkPolicies into these namespaces:
    - server: https://kubernetes.default.svc
      namespace: gateway
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: websites
    # E-Caddy-MVP S02: deploy/policies/network/caddy-mvp.yaml
    - server: https://kubernetes.default.svc
      namespace: caddy-mvp
    # The policies app places NetworkPolicies into this namespace:
    - server: https://kubernetes.default.svc
      namespace: mulligan
    # The rollouts app (vendored Argo Rollouts controller install):
    - server: https://kubernetes.default.svc
      namespace: argo-rollouts
    # The crossplane app (E6): Crossplane v2 core + Website XRD/Composition.
    - server: https://kubernetes.default.svc
      namespace: crossplane-system
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: kyverno.io
      kind: ClusterPolicy
    # The vendored controller installs (kyverno, rollouts) carry CRDs and
    # cluster RBAC; still a closed list, not */*.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    # E6 Crossplane platform API (cluster-scoped CRs; still a closed list):
    - group: apiextensions.crossplane.io
      kind: CompositeResourceDefinition
    - group: apiextensions.crossplane.io
      kind: Composition
    - group: pkg.crossplane.io
      kind: Function
    - group: pkg.crossplane.io
      kind: DeploymentRuntimeConfig

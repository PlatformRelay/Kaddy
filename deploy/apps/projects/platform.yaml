# E1c AppProject hardening (security review P1-2): restricted project for
# the platform control plane. AUTHORED, NOT YET WIRED — the root Application
# syncs deploy/apps/ with recurse OFF, so this projects/ subdirectory is
# intentionally invisible to Argo CD until the cluster-hardening lane applies
# the projects and cuts the Applications over from `project: default`.
#
# Intended members: root (app-of-apps), platform-core (ClusterIssuers),
# policies (Kyverno + NetworkPolicies), identity (deferred).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    owner: platform-team
    service: platform
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: platform
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1c-APPPROJECT
spec:
  description: >-
    kaddy platform control plane: app-of-apps root, cert-manager issuers,
    admission/network policies, identity. Source of truth is this repo only.
  sourceRepos:
    - https://github.com/PlatformRelay/Kaddy.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: kyverno
    - server: https://kubernetes.default.svc
      namespace: identity
    # The policies app places NetworkPolicies into these namespaces:
    - server: https://kubernetes.default.svc
      namespace: gateway
    - server: https://kubernetes.default.svc
      namespace: monitoring
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: kyverno.io
      kind: ClusterPolicy

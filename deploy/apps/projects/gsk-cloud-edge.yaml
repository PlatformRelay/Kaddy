# E1g-S05b — restricted AppProject for the gridscale GSK cloud-edge Gateway API
# controller (Traefik). CLOUD-ONLY membership.
#
# WHY A DEDICATED PROJECT: the Traefik controller lands in ns `traefik`, pulls
# the traefik/traefik chart from the upstream Helm repo, and (via the chart)
# creates the cluster-scoped `traefik` GatewayClass plus its ClusterRole/
# ClusterRoleBinding. No existing project permits that namespace + sourceRepo +
# cluster-scoped GatewayClass, so a new closed-list project is the
# least-clobbering fit (leaves platform/observability/workloads untouched) —
# mirrors the e8b-demo dedicated-project pattern.
#
# INERT ON KIND: this AppProject is a policy object with NO members on the local
# kind cluster (the Applications in this project —
# deploy/gateway-controller/traefik/application.yaml + deploy/apps-cloud/*.yaml
# — live OUTSIDE the kind app-of-apps root and are applied only on the GSK
# edge). Like every project it is GitOps-managed via the root's recurse-on sync
# of deploy/apps/, and `task bootstrap:e3` applies projects/ first so the
# cloud-edge children can reference it when they are applied on GSK.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gsk-cloud-edge
  namespace: argocd
  labels:
    owner: platform-team
    service: gateway-controller
    part-of: kaddy
    managed-by: argocd
    data-classification: internal
    business-criticality: business-critical
    track: stable
    app.kubernetes.io/name: gsk-cloud-edge
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/req: REQ-E1g-S05b
    kaddy.io/status: cloud-only-gsk-edge
spec:
  description: >-
    kaddy GSK cloud-edge (E1g): the Traefik Gateway API controller in `traefik`,
    the clubhouse Gateway/Certificates/HTTPRoutes, and the DNS-01 ClusterIssuers.
    Cloud-only — the member Applications live outside the kind app-of-apps
    (deploy/gateway-controller/traefik/ + deploy/apps-cloud/) and are applied
    only on the gridscale GSK edge. On-demand, torn down after each demo.
  sourceRepos:
    - https://github.com/PlatformRelay/Kaddy.git
    # The Traefik Gateway API controller Helm chart (closed list — one repo).
    - https://traefik.github.io/charts
  destinations:
    # Closed list, per member App (the offline gate cross-checks every
    # namespace deploy/gateway/cloud-only actually uses appears here):
    # - traefik: the controller, the clubhouse Gateway + per-host Certificates.
    # - argocd/monitoring/caddy-demo/caddy-mvp/portal: one HTTPRoute each
    #   (gateway-cloud-edge App) — routes live in their app's namespace and
    #   attach to the clubhouse listeners by sectionName.
    # - cert-manager: nominal destination of cert-manager-cloud-edge (its
    #   ClusterIssuers are cluster-scoped; their token Secret lives here).
    - server: https://kubernetes.default.svc
      namespace: traefik
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: caddy-demo
    - server: https://kubernetes.default.svc
      namespace: caddy-mvp
    - server: https://kubernetes.default.svc
      namespace: portal
    - server: https://kubernetes.default.svc
      namespace: cert-manager
  clusterResourceWhitelist:
    # The Traefik chart creates the GatewayClass and its cluster RBAC. Closed
    # list, not */*.
    - group: gateway.networking.k8s.io
      kind: GatewayClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # The DNS-01 Let's Encrypt issuers (cert-manager-cloud-edge App) are
    # cluster-scoped ClusterIssuers.
    - group: cert-manager.io
      kind: ClusterIssuer

# REQ-E4-S01 — branded kaddy "clubhouse" landing page.
#
# Served by nginx-unprivileged from /usr/share/nginx/html. The body carries the
# identifiable marker string "clubhouse" that REQ-E4-S02-01 asserts, plus a
# nginx.conf that binds the unprivileged listener on :8080 (matches the Service
# and the container's non-root default).
apiVersion: v1
kind: ConfigMap
metadata:
  name: clubhouse-site
  namespace: gateway
  labels:
    owner: platform-team
    service: clubhouse
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: clubhouse
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>kaddy · clubhouse</title>
        <style>
          :root { color-scheme: dark; }
          body {
            margin: 0; min-height: 100vh; display: grid; place-items: center;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at 30% 20%, #12351f, #0a0f0d 70%);
            color: #e8f5ee;
          }
          main { text-align: center; padding: 2rem; }
          h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin: 0 0 .25rem; letter-spacing: -0.02em; }
          .flag { font-size: 3rem; }
          p { opacity: .8; margin: .5rem 0; }
          code { background: #ffffff14; padding: .15rem .4rem; border-radius: .3rem; }
        </style>
      </head>
      <body>
        <main>
          <div class="flag">&#9971;</div>
          <h1>clubhouse</h1>
          <p>Served over real HTTPS through the kaddy Cilium edge.</p>
          <p>TLS terminated at the <code>gateway</code> platform Gateway
             &middot; cert issued by <code>kaddy-local-ca</code>.</p>
        </main>
      </body>
    </html>
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      # nginx-unprivileged writes temp paths under /tmp (read-only rootfs safe).
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location = /healthz { return 200 "ok\n"; }
        location / { try_files $uri $uri/ =404; }
      }
    }

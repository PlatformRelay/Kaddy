# REQ-CADDY-S02-02 / REQ-CADDY-S02-04 — caddy-origin canary Rollout.
#
# Serves the tag-pinned kaddy-showcase image (website-demo pin). Gateway API
# plugin shifts HTTPRoute weights (20% → 50%). `track` + PodMonitor
# podTargetLabels give Prometheus the canary dimension.
#
# securityContext: allowPrivilegeEscalation + NET_BIND_SERVICE — upstream caddy
# images ship cap_net_bind_service FILE capability; with no-new-privs the
# execve is EPERM for non-root (same as Website Composition).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: caddy-origin
  namespace: caddy-mvp
  labels:
    owner: platform-team
    service: caddy-origin
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: caddy
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
  annotations:
    kaddy.io/req: REQ-CADDY-S02-02
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: caddy-origin
  template:
    metadata:
      labels:
        app: caddy-origin
        owner: platform-team
        service: caddy-origin
        part-of: kaddy
        managed-by: argocd
        data-classification: public
        business-criticality: business-operational
        track: stable
        app.kubernetes.io/name: caddy
        app.kubernetes.io/part-of: kaddy
        app.kubernetes.io/managed-by: argocd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          image: ghcr.io/platformrelay/kaddy-showcase:0.1.1
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  strategy:
    canary:
      stableService: caddy-origin-stable
      canaryService: caddy-origin-canary
      canaryMetadata:
        labels:
          track: canary
      stableMetadata:
        labels:
          track: stable
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: caddy-mvp
            namespace: caddy-mvp
      steps:
        - setWeight: 20
        - pause:
            duration: 20s
        - setWeight: 50
        - pause:
            duration: 20s
        - setWeight: 100

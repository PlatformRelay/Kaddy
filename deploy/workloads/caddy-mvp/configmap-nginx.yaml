# REQ-CADDY-S05-03 — nginx reverse-proxy → Caddy origin (in-cluster).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
  namespace: caddy-mvp
  labels:
    owner: platform-team
    service: nginx-proxy
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: nginx-proxy
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
data:
  nginx.conf: |
    worker_processes 1;
    error_log /tmp/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 128; }
    http {
      access_log /tmp/access.log;
      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;
      fastcgi_temp_path /tmp/fastcgi;
      uwsgi_temp_path /tmp/uwsgi;
      scgi_temp_path /tmp/scgi;
      server {
        listen 8080;
        location /healthz { return 200 'ok'; }
        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_pass http://caddy-origin-stable:8080;
        }
      }
    }

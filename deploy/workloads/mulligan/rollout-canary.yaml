# REQ-E7-S02-01/02/03 — canary Rollout that shifts HTTPRoute backend weights.
#
# The Gateway API plugin (argoproj-labs/gatewayAPI, wired in deploy/rollouts/
# config.yaml) rewrites the `mulligan` HTTPRoute backendRef weights to match each
# canary step (0 → 20 → 50 → 100). Proven live: the HTTPRoute weight actually
# changes during a rollout. `track` label on the pod template gives Prometheus a
# `track=stable|canary` dimension (REQ-E7-S02-03).
#
# Image pinned (SEC-4). Read-only rootfs + dropped caps + non-root satisfy the
# security baseline and the enforce-mode Kyverno ADR-0301 label policy on Pods.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mulligan
  namespace: mulligan
  labels:
    owner: platform-team
    service: mulligan
    part-of: kaddy
    managed-by: argocd
    data-classification: public
    business-criticality: business-operational
    track: stable
    app.kubernetes.io/name: mulligan
    app.kubernetes.io/part-of: kaddy
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: mulligan
  template:
    metadata:
      labels:
        app: mulligan
        owner: platform-team
        service: mulligan
        part-of: kaddy
        managed-by: argocd
        data-classification: public
        business-criticality: business-operational
        track: stable
        app.kubernetes.io/name: mulligan
        app.kubernetes.io/part-of: kaddy
        app.kubernetes.io/managed-by: argocd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29.0-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: site
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: site
          configMap:
            name: mulligan-site
        - name: tmp
          emptyDir: {}
  strategy:
    canary:
      stableService: mulligan-stable
      canaryService: mulligan-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: mulligan
            namespace: mulligan
      steps:
        - setWeight: 20
        - pause:
            duration: 20s
        - setWeight: 50
        - pause:
            duration: 20s
        - setWeight: 100

# EXAMPLE — not synced by Argo CD. Phase-2 pattern only.
# ClusterSecretStore reads an out-of-band bootstrap Secret (never in git).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: kaddy-gridscale-bootstrap
  labels:
    owner: platform-team
    service: crossplane
    part-of: kaddy
    managed-by: manual
    data-classification: confidential
    business-criticality: business-operational
    track: stable
spec:
  provider:
    kubernetes:
      # Bootstrap Secret created by the operator out-of-band (not in git).
      # Example name only — replace when wiring ESO on GSK.
      remoteNamespace: crossplane-system
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets

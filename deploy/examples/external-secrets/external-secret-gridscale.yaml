# EXAMPLE — not synced by Argo CD. Phase-2 pattern only.
# Syncs gridscale API credentials into Secret openstack-creds (REQ-E1c-S04-02).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gridscale-provider-creds
  namespace: crossplane-system
  labels:
    owner: platform-team
    service: crossplane
    part-of: kaddy
    managed-by: external-secrets
    data-classification: confidential
    business-criticality: business-operational
    track: stable
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kaddy-gridscale-bootstrap
  target:
    name: openstack-creds
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: gridscale-bootstrap
        property: token
    - secretKey: uuid
      remoteRef:
        key: gridscale-bootstrap
        property: uuid

# E1g-S05f — token-LESS External Secrets pattern for the Cloudflare DNS-01 API
# token (CLOUD-ONLY; NOT applied on kind; EXCLUDED-by-location from GitOps sync).
#
# THE TOKEN IS NEVER IN GIT. These two objects describe HOW the token reaches
# the cluster without ever committing it: an ExternalSecret pulls it from an
# out-of-band SecretStore and materialises Secret `cloudflare-api-token` (ns
# cert-manager, key `api-token`) — exactly the Secret the DNS-01 ClusterIssuers
# in this directory reference. This mirrors deploy/examples/external-secrets/.
#
# TWO WAYS TO SUPPLY THE TOKEN ON THE EDGE (operator picks one):
#   1. Wire External Secrets Operator with a real provider store (below is a
#      kubernetes-provider example reading an out-of-band bootstrap Secret), OR
#   2. Skip ESO and create the Secret directly, out-of-band, once:
#        kubectl -n cert-manager create secret generic cloudflare-api-token \
#          --from-literal=api-token="$CLOUDFLARE_TOKEN"
#      (that command is documented, not committed — $CLOUDFLARE_TOKEN is a live
#      shell var, never a repo literal).
#
# The remoteRef key/property below are PLACEHOLDERS — replace with your store's
# real path when wiring ESO on GSK. There is no secret material in this file.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cloudflare-bootstrap
  namespace: cert-manager
  labels:
    owner: platform-team
    service: platform-core
    part-of: kaddy
    managed-by: manual
    data-classification: confidential
    business-criticality: business-critical
    track: stable
  annotations:
    kaddy.io/req: REQ-E1g-S05f
    kaddy.io/status: cloud-only-gsk-edge
spec:
  provider:
    # EXAMPLE provider — kubernetes-backed store reading an out-of-band bootstrap
    # Secret the operator created manually (never in git). Swap for your real
    # backend (Vault, cloud KMS, …) when wiring ESO on GSK.
    kubernetes:
      remoteNamespace: cert-manager
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  labels:
    owner: platform-team
    service: platform-core
    part-of: kaddy
    managed-by: external-secrets
    data-classification: confidential
    business-criticality: business-critical
    track: stable
  annotations:
    kaddy.io/req: REQ-E1g-S05f
    kaddy.io/status: cloud-only-gsk-edge
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: cloudflare-bootstrap
  target:
    # Materialises exactly the Secret the DNS-01 ClusterIssuers reference.
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        # PLACEHOLDER path — replace with your store's real key/property.
        key: cloudflare-bootstrap
        property: api-token

# E12 deck gate — the interview deck must stay recording-ready: reproducible
# Slidev build + word-by-word speaker notes + wordcount + iframe surfaces +
# narrative beats (tests/deck/exit-recording-ready.sh). Publishes slides/dist
# as the artifact the clubhouse/Caddy tenant can serve later.
name: deck

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - 'tests/deck/**'
      - '.github/workflows/deck.yaml'
  pull_request:
    paths:
      - 'slides/**'
      - 'tests/deck/**'
      - '.github/workflows/deck.yaml'

permissions:
  contents: read

jobs:
  deck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: slides/pnpm-lock.yaml
      - name: deck exit gate (build + notes + wordcount + iframes + beats)
        run: bash tests/deck/exit-recording-ready.sh
      - name: Upload deck artifact (slides/dist)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deck-dist
          path: slides/dist/
          retention-days: 14

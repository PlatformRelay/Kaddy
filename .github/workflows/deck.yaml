# E12 deck gate — the interview deck must stay recording-ready: reproducible
# Slidev build + word-by-word speaker notes + wordcount + iframe surfaces +
# narrative beats (tests/deck/exit-recording-ready.sh). Publishes slides/dist
# as the artifact the clubhouse/Caddy tenant can serve later, plus a Playwright
# PDF export (kubernetes-workshop release pattern) as deck-pdf.
name: deck

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - 'tests/deck/**'
      - '.github/workflows/deck.yaml'
  pull_request:
    paths:
      - 'slides/**'
      - 'tests/deck/**'
      - '.github/workflows/deck.yaml'

permissions:
  contents: read

env:
  # Slidev + pnpm must run non-interactively (pnpm otherwise prompts on its
  # dependency-build allowlist). Mirrors kubernetes-workshop CI.
  CI: "true"

jobs:
  deck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: slides/pnpm-lock.yaml
      - name: deck exit gate (build + notes + wordcount + iframes + beats)
        run: bash tests/deck/exit-recording-ready.sh
      - name: Install Chromium system dependencies
        # Browser binary comes from playwright-chromium postinstall; this adds
        # the OS libraries slidev export needs headless (workshop release.yml).
        working-directory: slides
        run: pnpm exec playwright install-deps chromium
      - name: Export deck PDF (Playwright)
        run: bash tests/deck/slidev-export.sh
      - name: Upload deck artifact (slides/dist)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deck-dist
          path: slides/dist/
          retention-days: 14
      - name: Upload deck PDF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deck-pdf
          path: slides/kaddy-deck.pdf
          retention-days: 14

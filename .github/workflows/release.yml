# Tag-triggered release — kubernetes-workshop pattern adapted for kaddy.
# On `v*` tags: Playwright-export the Slidev deck to PDF, size-guard it
# (reject hollow ~2KB PDFs), and attach `kaddy-deck.pdf` to the GitHub Release.
# Ordinary pushes never release; cut one by tagging:
#
#   git tag v0.6.1 && git push origin v0.6.1
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/update the release and upload the PDF asset

env:
  # Slidev + pnpm must run non-interactively (pnpm otherwise prompts on its
  # dependency-build allowlist). Mirrors deck.yaml / kubernetes-workshop CI.
  CI: "true"

jobs:
  release:
    name: Export deck PDF and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: slides/pnpm-lock.yaml

      - name: Install slide dependencies
        working-directory: slides
        run: pnpm install --frozen-lockfile

      - name: Install Chromium system dependencies
        # OS libraries for headless Chromium (workshop release.yml pattern).
        working-directory: slides
        run: pnpm exec playwright install-deps chromium

      - name: Install Chromium browser
        # Browser binary itself — install-deps alone does not download it;
        # playwright-chromium postinstall is not reliable under pnpm CI.
        working-directory: slides
        run: pnpm exec playwright install chromium

      - name: Export deck PDF (Playwright + size guard)
        # tests/deck/slidev-export.sh asserts a FRESH, non-hollow PDF
        # (MIN_DECK_PDF_BYTES) before softprops uploads it to the Release.
        run: bash tests/deck/slidev-export.sh

      - name: Publish GitHub Release with deck PDF
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: slides/kaddy-deck.pdf
          fail_on_unmatched_files: true
          generate_release_notes: true

# REQ-CADDY-S05-02 + SEC-8 — build, push and KEYLESS-SIGN kaddy's first
# self-published image (the showcase tenant). PRs build only (no push, no
# sign); pushes to main and v* tags publish to GHCR and cosign-sign the
# DIGEST via ambient GitHub OIDC (no long-lived key — replaces the
# placeholder-key story in deploy/policies/kyverno/verify-signed-images.yaml).
# The in-workflow `cosign verify` step is the proof the Kyverno keyless
# attestor (issuer + workflow identity) matches what CI actually signs.
#
# SEC-4: actions pinned to exact release tags (repo style). SEC-5 rider:
# upgrade to full commit-SHA pinning alongside the other workflows.
name: showcase-image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'slides/**'
      - 'deploy/showcase/**'
      - '.github/workflows/showcase-image.yaml'
  pull_request:
    paths:
      - 'slides/**'
      - 'deploy/showcase/**'
      - '.github/workflows/showcase-image.yaml'

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign: ambient GitHub OIDC token

env:
  IMAGE: ghcr.io/platformrelay/kaddy-showcase

jobs:
  build-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4.2.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # git SHA always; semver on v* tag runs; latest tracks main
          tags: |
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: deploy/showcase/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Keyless sign (the DIGEST, not a tag)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature (proof step — same identity Kyverno checks)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/PlatformRelay/Kaddy/\.github/workflows/showcase-image\.yaml@.+$' \
            "${IMAGE}@${DIGEST}"

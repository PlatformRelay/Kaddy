# REQ-CADDY-S05-02 + SEC-8 — build, push and KEYLESS-SIGN kaddy's first
# self-published image (the showcase tenant). PRs build only (no push, no
# sign); pushes to main and v* tags publish to GHCR and cosign-sign the
# DIGEST via ambient GitHub OIDC (no long-lived key — replaces the
# placeholder-key story in deploy/policies/kyverno/verify-signed-images.yaml).
# The in-workflow `cosign verify` step is the proof the Kyverno keyless
# attestor (issuer + workflow identity) matches what CI actually signs.
#
# SEC-4/SEC-5: actions pinned to full commit SHAs (version as comment),
# Renovate-compatible — done across ALL workflows (SEC-5 rider, 2026-07-16).
name: showcase-image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'slides/**'
      - 'deploy/showcase/**'
      - '.github/workflows/showcase-image.yaml'
  pull_request:
    paths:
      - 'slides/**'
      - 'deploy/showcase/**'
      - '.github/workflows/showcase-image.yaml'

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign: ambient GitHub OIDC token

env:
  IMAGE: ghcr.io/platformrelay/kaddy-showcase

jobs:
  build-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # git SHA always; semver on v* tag runs; latest tracks main
          tags: |
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/showcase/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless sign (the DIGEST, not a tag)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature (proof step — same identity Kyverno checks)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/PlatformRelay/Kaddy/\.github/workflows/showcase-image\.yaml@.+$' \
            "${IMAGE}@${DIGEST}"

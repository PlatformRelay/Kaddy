# kaddy local dev substrate — kind cluster for Cilium Gateway API (E1e, REQ-E1e-S01-01).
#
# Cilium owns CNI + kube-proxy, so the default CNI (kindnet) and kube-proxy are
# disabled here. Node image is pinned to an exact tag. Gateway/LB ports are mapped
# to the loopback interface ONLY (127.0.0.1), never a wildcard bind, because the
# docker/podman kind bridge subnet is not host-routable on macOS, so real HTTP
# reachability goes through these loopback-bound NodePorts (REQ-E1e-S04-01).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Cilium is installed as the CNI (REQ-E1e-S02-01).
  disableDefaultCNI: true
  # Cilium runs kube-proxy replacement — kind must not install kube-proxy.
  kubeProxyMode: "none"
nodes:
  - role: control-plane
    # NOTE: node image tag is kept in sync with hack/cluster/versions.env
    # (KIND_NODE_IMAGE). kind-up.sh passes --image from versions.env; this
    # inline tag is the pinned default and the value the meta test asserts.
    image: kindest/node:v1.33.1
    extraPortMappings:
      # Gateway HTTP — bound to loopback only (macOS-safe local reachability).
      - containerPort: 30080
        hostPort: 30080
        listenAddress: "127.0.0.1"
        protocol: TCP
      # Gateway HTTPS — bound to loopback only.
      - containerPort: 30443
        hostPort: 30443
        listenAddress: "127.0.0.1"
        protocol: TCP

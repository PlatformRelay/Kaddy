# markdownlint-cli2 config — RULE config only (rule tuning under `config:`).
#
# NOTE: the lint GLOBS are NOT set here. markdownlint-cli2 only honours a
# `globs:` key from an auto-discovered `.markdownlint-cli2.yaml` in the cwd, or
# from positional args — NOT from a file passed via `--config` (which supplies
# rule config). Because this file lives under hack/tooling/ it is never
# auto-discovered, so the shippable-doc globs are passed positionally by both
# `task lint` (Taskfile.yml) and the CI step (.github/workflows/verify.yaml).
# Keep those two invocations in sync. Canonical shippable set (for reference):
#   docs/**/*.md openspec/**/*.md modules/**/*.md evidence/**/*.md \
#   operator/**/*.md deploy/**/*.md tests/**/*.md skills/**/*.md *.md
# Deliberately EXCLUDED (machine/scratch/vendored — never linted):
#   .claude/** (git worktrees) · references/** (cached vendor docs, gitignored)
#   agent-context/** (agent/operator scratch) · slides/** (deck self-disables)
config:
  # --- Disabled: genuine noise for this table/prose/runbook-heavy repo ---
  # line-length: long spec tables and prose lines are intentional.
  MD013: false
  # no-duplicate-heading: epic sub-headers (Why/What/Impact…) legitimately
  # recur across sections within a single doc.
  MD024: false
  # no-inline-html: docs embed badge/anchor HTML.
  MD033: false
  # no-bare-urls: runbooks paste raw URLs on purpose.
  MD034: false
  # table-pipe-style: table border cosmetics, not correctness.
  MD055: false
  # table-column-count cosmetics from intentional layout tables.
  MD060: false
  # commands-show-output: runbooks show command + output in one fence.
  MD014: false

  # --- Tuned: match the repo's prevailing house style ---
  # ul-style: dash — the repo's bullets are `-`; enforce that (not the linter
  # default of "first-seen") so the rule normalises toward convention.
  MD004:
    style: dash

  # --- Kept ON (structural / correctness — enforced) ---
  # MD001 heading-increment, MD012 no-multiple-blanks,
  # MD022/MD031/MD032 surrounding-blanks, MD028 no-blank-in-blockquote,
  # MD029 ol-prefix, MD036 emphasis-as-heading, MD040 fenced-code-language,
  # MD046 code-block-style, MD047 trailing-newline, MD009 trailing-spaces.
ignores:
  - node_modules
  # OpenTofu/Terraform provider cache (gitignored, created by `tofu init`) —
  # contains vendored provider CHANGELOG.md/README.md under modules/**. Excluded
  # so a local/CI `task verify` init before this step can't red the gate.
  - "**/.terraform/**"
  # generated by git-cliff (cliff.toml) — linting it couples the gate to
  # release-tool output (the template emits `### Group` + list with no blank).
  - CHANGELOG.md
  # Harness skill bodies are synced from PlatformRelay `.claude/skills/` and use
  # a dense heading/list style. Catalogue prose stays linted via skills/README.md.
  - "skills/*/SKILL.md"

# SOPS config — age recipients per path (ADR-0110).
# Private key: ~/.config/sops/age/keys.txt (never commit).
# Encrypt: sops --encrypt --in-place <file> · Decrypt: sops --decrypt <file>
---
keys:
  - &operator age1llu2lzcdaauzqscewak9jsqdxfut7l77d5kxmaeqkwnxv8zm7cvsen2p6l

creation_rules:
  - path_regex: '(^|/)deploy/secrets/.*\.ya?ml$'
    encrypted_regex: ^(data|stringData)$
    age:
      - *operator

  - path_regex: '[^/]+\.sops\.ya?ml$'
    age:
      - *operator

# Pre-commit hooks — install: pre-commit install
# Mirrors CI secret hygiene; gitleaks runs on every commit.
---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config=.github/gitleaks.toml]

  - repo: local
    hooks:
      - id: scrub-denylist
        name: scrub-denylist
        entry: bash hack/scrub-denylist.sh
        language: system
        pass_filenames: false

      - id: markdownlint
        name: markdownlint-cli2
        # TEST-8: config path is the dotted .markdownlint-cli2.yaml (matches
        # Taskfile MARKDOWNLINT_CONFIG); lint failures propagate (no `|| true`),
        # but an absent tool skips gracefully instead of failing the hook.
        entry: bash -c 'if command -v markdownlint-cli2 >/dev/null; then markdownlint-cli2 --config hack/tooling/.markdownlint-cli2.yaml "$@"; else echo "markdownlint-cli2 not installed — skip"; fi' --
        language: system
        files: \.md$

# promtool test rules — marshal alerting (E5)
# L1 unit tests for the PrometheusRule alerts in deploy/monitoring/rules/.
# Rule files are produced by hack/monitoring/extract-rules.sh (projects .spec out
# of each PrometheusRule CR). Run the extract first, then:
#   task test:promrules   OR   promtool test rules tests/promtool/marshal.test.yaml
#
# Each alert is proved to FIRE on its condition and to stay SILENT below threshold,
# asserting the ADR-0301 alert labels (severity, service, owner).
rule_files:
  - /tmp/marshal-caddy.rules.yaml
  - /tmp/marshal-http.rules.yaml

evaluation_interval: 1m

tests:
  # -------------------------------------------------------------------------
  # REQ-E5-S06-01 — CaddyTargetDown (marshal-caddy.yaml)
  # up{job="caddy"} at 0 for > 2m must fire severity=critical with service label.
  # -------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'up{job="caddy",instance="caddy:2019"}'
        # up for 2m, then down (0) for 4m — crosses the 2m `for:` window.
        values: '1 1 0 0 0 0'
    alert_rule_test:
      # Silent: only 1m into the outage — below the 2m `for:` window.
      - eval_time: 2m
        alertname: CaddyTargetDown
        exp_alerts: []
      # Fires: 3m into the outage (>2m), still down.
      - eval_time: 5m
        alertname: CaddyTargetDown
        exp_alerts:
          - exp_labels:
              severity: critical
              service: caddy
              owner: platform-team
              job: caddy
              instance: caddy:2019
            exp_annotations:
              summary: 'Caddy scrape target down'
              description: 'Caddy target caddy:2019 (job caddy) has been down for more than 2 minutes. Requests may be failing at the gateway.'

  # -------------------------------------------------------------------------
  # REQ-E5-S06-02 — HighHTTPErrorRate (marshal-http.yaml)
  # 5xx ratio > 5% sustained over the `for:` window must fire.
  # -------------------------------------------------------------------------
  - interval: 1m
    input_series:
      # Total request rate ~ constant. 5xx share climbs above 5% and stays there.
      - series: 'caddy_http_requests_total{job="caddy",code="200"}'
        values: '0+600x15'          # 600 req/min = 10 rps of 200s
      - series: 'caddy_http_requests_total{job="caddy",code="500"}'
        values: '0+60x15'           # 60 req/min = 1 rps of 500s -> ~9.1% error ratio
    alert_rule_test:
      # Silent early: not enough samples / `for:` not satisfied at 3m.
      - eval_time: 3m
        alertname: HighHTTPErrorRate
        exp_alerts: []
      # Fires: ratio ~9% > 5% sustained past the `for:` window.
      - eval_time: 12m
        alertname: HighHTTPErrorRate
        exp_alerts:
          - exp_labels:
              severity: warning
              service: caddy
              owner: platform-team
            exp_annotations:
              summary: 'Caddy HTTP 5xx error rate above 5%'
              description: 'Caddy is returning 5xx responses for more than 5% of requests over the last 5 minutes (sustained 5m).'

  # HighHTTPErrorRate stays SILENT when 5xx share is below 5%.
  - interval: 1m
    input_series:
      - series: 'caddy_http_requests_total{job="caddy",code="200"}'
        values: '0+600x15'          # 10 rps of 200s
      - series: 'caddy_http_requests_total{job="caddy",code="500"}'
        values: '0+6x15'            # 0.1 rps of 500s -> ~1% error ratio (< 5%)
    alert_rule_test:
      - eval_time: 12m
        alertname: HighHTTPErrorRate
        exp_alerts: []

  # -------------------------------------------------------------------------
  # REQ-E5-S06-03 — HighHTTPLatency (marshal-http.yaml)
  # p99 request latency > 500ms must fire. Classic histogram _bucket series.
  # le buckets are cumulative & non-decreasing, including +Inf.
  # -------------------------------------------------------------------------
  - interval: 1m
    input_series:
      # All observations land in the (0.5, 1.0] bucket => p99 ~ between 0.5 and 1.0 => > 0.5s.
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="0.1"}'
        values: '0+0x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="0.5"}'
        values: '0+0x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="1.0"}'
        values: '0+100x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="+Inf"}'
        values: '0+100x15'
    alert_rule_test:
      - eval_time: 12m
        alertname: HighHTTPLatency
        exp_alerts:
          - exp_labels:
              severity: warning
              service: caddy
              owner: platform-team
            exp_annotations:
              summary: 'Caddy p99 HTTP latency above 500ms'
              description: 'Caddy p99 request latency has exceeded 500ms over the last 5 minutes (sustained 5m).'

  # HighHTTPLatency stays SILENT when p99 is comfortably under 500ms.
  - interval: 1m
    input_series:
      # All observations in the (0.0, 0.1] bucket => p99 <= 0.1s < 0.5s.
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="0.1"}'
        values: '0+100x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="0.5"}'
        values: '0+100x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="1.0"}'
        values: '0+100x15'
      - series: 'caddy_http_request_duration_seconds_bucket{job="caddy",le="+Inf"}'
        values: '0+100x15'
    alert_rule_test:
      - eval_time: 12m
        alertname: HighHTTPLatency
        exp_alerts: []

  # -------------------------------------------------------------------------
  # REQ-E5-S06-03 — HighRequestRate (marshal-http.yaml)
  # Request rate > 100 rps sustained for 2m must fire.
  # -------------------------------------------------------------------------
  - interval: 1m
    input_series:
      # 9000 req/min = 150 rps > 100 rps.
      - series: 'caddy_http_requests_total{job="caddy",code="200"}'
        values: '0+9000x15'
    alert_rule_test:
      # Silent right at the start — `for: 2m` not yet satisfied.
      - eval_time: 1m
        alertname: HighRequestRate
        exp_alerts: []
      # Fires: 150 rps sustained past 2m.
      - eval_time: 10m
        alertname: HighRequestRate
        exp_alerts:
          - exp_labels:
              severity: warning
              service: caddy
              owner: platform-team
            exp_annotations:
              summary: 'Caddy request rate above 100 rps'
              description: 'Caddy is serving more than 100 requests per second (5m rate), sustained for 2 minutes. Verify capacity / possible traffic spike.'

  # HighRequestRate stays SILENT below 100 rps.
  - interval: 1m
    input_series:
      # 3000 req/min = 50 rps < 100 rps.
      - series: 'caddy_http_requests_total{job="caddy",code="200"}'
        values: '0+3000x15'
    alert_rule_test:
      - eval_time: 10m
        alertname: HighRequestRate
        exp_alerts: []

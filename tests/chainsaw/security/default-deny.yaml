# REQ-E1c-S01-01: the default-deny NetworkPolicy baseline is LIVE in every
# covered namespace (gateway: ingress+egress; monitoring/argocd: ingress) —
# the objects that make "any pod can reach any pod" false (SEC-6 / review
# P1-1). Enforcement behaviour is proven by the sibling suites
# (gateway-to-app allow, unauthorized-ingress-fails deny).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: security-default-deny
  annotations:
    kaddy.io/req: REQ-E1c-S01-01
    # Un-skipped by CI substrate parity (2026-07-16): chainsaw CI now builds its
    # cluster from the LIVE substrate recipe (hack/cluster/kind-up.sh — Cilium +
    # Gateway API CRDs + LB-IPAM + cert-manager/kaddy-local-ca, pinned via
    # hack/cluster/versions.env), and applies the SAME
    # deploy/policies/network/{gateway,monitoring,argocd}.yaml baseline the live
    # policies app syncs (argocd ns is created bare in CI — no Argo CD there,
    # the namespace-wide deny floor still applies). Also verified PASSING
    # against live kind-kaddy-dev (2026-07-16).
    kaddy.io/status: ci-enforced-2026-07-16-substrate-parity
spec:
  concurrent: false
  description: default-deny NetworkPolicies present in gateway, monitoring and argocd
  steps:
    - name: gateway-deny-all
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                namespace: gateway
                name: default-deny-all
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                  - Egress
    - name: monitoring-deny-ingress
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                namespace: monitoring
                name: default-deny-ingress
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
    - name: argocd-deny-ingress
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                namespace: argocd
                name: default-deny-ingress
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress

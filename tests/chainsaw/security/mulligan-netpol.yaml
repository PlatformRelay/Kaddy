# Audit F-01 (P1): the mulligan namespace (E7 progressive-delivery demos,
# public-facing via the mulligan Gateway/HTTPRoute) carries the SAME
# default-deny NetworkPolicy baseline as the sibling tenant namespaces
# (gateway/websites/identity) — a workload namespace with no NetworkPolicy is
# a finding (GUIDELINES §3 / ADR-0106).
#
# Self-contained (the marshal-rules-present pattern): applies
# deploy/policies/network/mulligan.yaml itself via a relative path, because
# the CI workflow's network-baseline step predates mulligan and applies only
# gateway/monitoring/argocd. Runs in the ephemeral CI kind cluster (mulligan
# ns + workloads are applied there for the rollouts suites; the namespace
# apply below is an idempotent no-op) AND against the live kaddy-dev cluster,
# where the manual-sync policies app syncs the same file post-merge (kubectl
# apply is idempotent and the content is identical to git — no drift).
#
# ENFORCEMENT steps (tech-review follow-up F1): beyond presence, prove the
# policies actually bite (Cilium enforces them in CI-parity kind AND live):
#   - deny branch (mirrors unauthorized-ingress-fails.yaml): a fully-labeled
#     nonroot probe pod in the UNSANCTIONED `default` namespace cannot curl
#     mulligan-stable :8080 directly — the only thing failing is the network
#     path. The probe POLLS until the deny is stable, because the API-object
#     asserts above prove the policies EXIST but not that Cilium finished
#     programming the datapath (endpoint regeneration lags object creation — the
#     source of the twin-pass/push-fail flake). Non-vacuity proven during
#     development: with the policies deleted every attempt returns 200 and the
#     step exhausts to a FAIL.
#   - allow branch (mirrors gateway-to-app.yaml): the SANCTIONED path through
#     the dedicated Cilium Gateway (Envoy carries the reserved `ingress`
#     identity, admitted by the CNP) still serves the demo page with 200.
#     The probe runs in `default` (unrestricted egress — unlike the gateway
#     namespace there is no probe-egress CNP needed; the policy under test is
#     mulligan's INGRESS side). Plain HTTP: the mulligan Gateway listener is
#     HTTP :80 (demo edge; TLS is out of this suite's scope).
# Both probes run AFTER the presence asserts, so the policies are applied and
# programmed before traffic is checked. Chainsaw cleanup (cleanup: true)
# deletes the self-applied policies afterwards — the live cluster ends with
# ZERO netpols in mulligan, as designed (not synced yet).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: security-mulligan-netpol
  annotations:
    kaddy.io/adr: "0106"
    kaddy.io/audit: F-01
spec:
  concurrent: false
  description: default-deny baseline present in mulligan AND enforced (direct denied, gateway allowed)
  steps:
    - name: apply-mulligan-netpol-baseline
      try:
        # Namespace first (idempotent — pre-exists in CI and live).
        - apply:
            file: ../../../deploy/workloads/mulligan/namespace.yaml
        - apply:
            file: ../../../deploy/policies/network/mulligan.yaml
    - name: mulligan-deny-all
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                namespace: mulligan
                name: default-deny-all
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                  - Egress
    - name: mulligan-dns-egress
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                namespace: mulligan
                name: allow-dns-egress
              spec:
                podSelector: {}
                policyTypes:
                  - Egress
                egress:
                  - to:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: kube-system
                        podSelector:
                          matchLabels:
                            k8s-app: kube-dns
                    ports:
                      - protocol: UDP
                        port: 53
                      - protocol: TCP
                        port: 53
    - name: mulligan-gateway-ingress-cnp
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: cilium.io/v2
              kind: CiliumNetworkPolicy
              metadata:
                namespace: mulligan
                name: allow-gateway-to-mulligan
              spec:
                endpointSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - mulligan
                        - mulligan-bg
                ingress:
                  - fromEntities:
                      - ingress
                    toPorts:
                      - ports:
                          - port: "8080"
                            protocol: TCP
    - name: direct-cross-ns-curl-denied
      try:
        - script:
            timeout: 300s
            content: |
              set -u
              # POLL-UNTIL-DENIED. The preceding asserts prove the NetworkPolicy
              # + CNP API OBJECTS exist — they do NOT prove Cilium regenerated the
              # endpoints (datapath programming lags object creation by seconds).
              # A single-shot probe fired immediately can slip through before
              # enforcement is programmed — the observed flake: the same-SHA twin
              # run's probe timed out (denied) while the push run's probe got HTML
              # 200 ten seconds later. So retry until the deny is STABLE.
              #
              # Non-vacuity is preserved: with the policies absent EVERY attempt
              # returns 200 and the loop exhausts to a FAIL (proven in dev).
              #
              # `kubectl run --rm` can leak the pod when attach flakes; a leftover
              # makes the next run fail on AlreadyExists. Pre-delete each attempt
              # so the only failure mode left is the network path.
              attempts=6
              denied=0
              for i in $(seq 1 "${attempts}"); do
                kubectl -n default delete pod f01-mulligan-unauth-probe --ignore-not-found --wait=true >/dev/null 2>&1 || true
                out="$(kubectl -n default run f01-mulligan-unauth-probe --rm -i --restart=Never \
                  --image=curlimages/curl:8.11.0 --quiet \
                  --labels=owner=platform-team,service=e1c-smoke,part-of=kaddy,managed-by=kubectl,track=stable,data-classification=internal,business-criticality=business-operational \
                  --overrides='{"spec":{"securityContext":{"runAsNonRoot":true,"runAsUser":100}}}' \
                  -- curl -sS -m 5 -o /dev/null -w 'HTTP_%{http_code}' http://mulligan-stable.mulligan.svc.cluster.local:8080/ 2>&1)"
                rc=$?
                # Guard against a VACUOUS "deny": a Kyverno admission rejection
                # means the pod never ran — that is a TEST failure, not a network
                # deny. Fail loudly instead of counting it as success.
                if printf '%s' "${out}" | grep -qiE 'admission webhook|denied the request|forbidden'; then
                  echo "FAIL: probe pod rejected by admission control, not the network path: ${out}" >&2
                  exit 2
                fi
                # Denied = curl exited nonzero AND emitted HTTP_000. curl's -w
                # writeout fires even on a failed transfer, so a real network
                # block (timeout rc=28 / refused rc=7) prints HTTP_000 as the
                # POSITIVE deny signal. A pod that never ran curl (attach flake,
                # pull/schedule failure) emits NO HTTP_ token and is correctly
                # NOT counted as a deny — it retries instead of passing
                # vacuously (tech-review F1). The probe runs in `default`
                # (unrestricted egress), so HTTP_000 here means the ingress path
                # was blocked, not a DNS/egress failure (tech-review F2).
                if [ "${rc}" -ne 0 ] && printf '%s' "${out}" | grep -q 'HTTP_000'; then
                  echo "attempt ${i}: curl denied (rc=${rc}, out=${out}) — mulligan default-deny ingress enforced"
                  denied=1
                  break
                fi
                echo "attempt ${i}: NOT yet denied (rc=${rc}, out=${out}) — Cilium may still be programming; retrying"
                sleep 8
              done
              if [ "${denied}" -ne 1 ]; then
                echo "FAIL: direct cross-ns curl to mulligan-stable was NOT denied after ${attempts} attempts (default-deny not enforced)" >&2
                exit 1
              fi
              echo "OK: direct cross-ns curl denied — default-deny ingress enforced on mulligan"
            check:
              # The script now carries the verdict in its own exit code: 0 once a
              # stable deny is observed, nonzero if the window exhausts without a
              # deny (or the probe was admission-rejected). So success == no error.
              ($error == null): true
    - name: curl-through-gateway-succeeds
      try:
        - script:
            timeout: 180s
            content: |
              set -eu
              GW_IP="$(kubectl -n mulligan get svc cilium-gateway-mulligan -o jsonpath='{.spec.clusterIP}')"
              [ -n "${GW_IP}" ]
              kubectl -n default delete pod f01-mulligan-gw-probe --ignore-not-found --wait=true >/dev/null 2>&1 || true
              kubectl -n default run f01-mulligan-gw-probe --rm -i --restart=Never \
                --image=curlimages/curl:8.11.0 --quiet \
                --labels=owner=platform-team,service=e1c-smoke,part-of=kaddy,managed-by=kubectl,track=stable,data-classification=internal,business-criticality=business-operational \
                --overrides='{"spec":{"securityContext":{"runAsNonRoot":true,"runAsUser":100}}}' \
                -- sh -c "code=\$(curl -s -o /dev/null -m 15 -w '%{http_code}' --resolve mulligan.kaddy.local:80:${GW_IP} http://mulligan.kaddy.local/); echo \"CODE:\${code}\"; [ \"\${code}\" = \"200\" ]"
            check:
              ($error == null): true

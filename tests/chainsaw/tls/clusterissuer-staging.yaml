# REQ-E3-S03-01: letsencrypt-staging ClusterIssuer reaches Ready=True (ACME
# account registered against the staging directory — outbound-only, works on kind).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tls-clusterissuer-staging-ready
  annotations:
    kaddy.io/req: REQ-E3-S03-01
spec:
  description: Let's Encrypt staging ClusterIssuer registers its ACME account
  steps:
    - name: staging-issuer-ready
      try:
        - assert:
            # Cluster-scoped; give ACME registration time to complete.
            timeout: 120s
            resource:
              apiVersion: cert-manager.io/v1
              kind: ClusterIssuer
              metadata:
                name: letsencrypt-staging
              status:
                conditions:
                  - type: Ready
                    status: "True"
      catch:
        - describe:
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            name: letsencrypt-staging

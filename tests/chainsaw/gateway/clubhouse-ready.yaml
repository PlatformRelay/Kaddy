# REQ-E4-S01-01 / S01-02: clubhouse Deployment ready + Service exposes :8080.
# Assumes the E4 manifests are already applied (GitOps sync or the E4 smoke apply).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gateway-clubhouse-ready
  annotations:
    kaddy.io/req: REQ-E4-S01-01
    # Un-skipped by CI substrate parity (2026-07-16): chainsaw CI now builds its
    # cluster from the LIVE substrate recipe (hack/cluster/kind-up.sh — Cilium +
    # Gateway API CRDs + LB-IPAM + cert-manager/kaddy-local-ca, pinned via
    # hack/cluster/versions.env) and applies deploy/gateway/ +
    # deploy/workloads/clubhouse/ before the suites run. Also verified PASSING
    # against the live kind-kaddy-dev cluster with:
    #   chainsaw test --test-file tests/chainsaw/gateway/clubhouse-ready.yaml .
    kaddy.io/status: ci-enforced-2026-07-16-substrate-parity
spec:
  description: clubhouse Deployment has ReadyReplicas >= 1 with mandatory labels; Service exposes 8080
  namespace: gateway
  steps:
    - name: deployment-ready
      try:
        - assert:
            timeout: 120s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: gateway
                name: clubhouse
                labels:
                  owner: platform-team
                  service: clubhouse
                  part-of: kaddy
                  managed-by: argocd
                  data-classification: public
                  business-criticality: business-operational
                  track: stable
              status:
                (readyReplicas > `0`): true
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: clubhouse
    - name: pod-carries-track-stable
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: gateway
                labels:
                  service: clubhouse
                  track: stable
              status:
                phase: Running
    - name: service-port-8080
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: gateway
                name: clubhouse
              spec:
                (ports[0].port): 8080

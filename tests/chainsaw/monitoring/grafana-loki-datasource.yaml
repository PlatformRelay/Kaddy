# REQ-E3-S02-05: Loki wired as a Grafana datasource (the single logs source). The
# provisioning ConfigMap carries the sidecar discovery label and a type: loki
# datasource body. It is NOT isDefault (Prometheus is the one org default;
# a second default makes Grafana refuse to boot) — spec verify checks type: loki.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: monitoring-grafana-loki-datasource
  annotations:
    kaddy.io/req: REQ-E3-S02-05
spec:
  description: Grafana Loki datasource ConfigMap is present and default
  namespace: monitoring
  steps:
    - name: loki-datasource-configmap
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                namespace: monitoring
                name: grafana-loki-datasource
                labels:
                  grafana_datasource: "1"
        - script:
            # The provisioning body must declare a type: loki datasource. It is
            # NOT default (Prometheus is the single org default; two defaults make
            # Grafana refuse to start) — matches the spec verify (type: loki only).
            content: |
              kubectl -n monitoring get cm grafana-loki-datasource -o yaml \
                | grep -qi 'type: loki'
            check:
              ($error): ~

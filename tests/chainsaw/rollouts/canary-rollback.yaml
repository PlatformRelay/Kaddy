# REQ-E7-S02-02 (PARTIAL — abort-driven, not analysis-driven): aborting a canary
# rolls HTTPRoute weights back to 100% stable — the "mulligan" self-heal. The spec
# frames this as an AnalysisRun *failure* driving the rollback; the AnalysisTemplate
# is scaffolded but not wired into the Rollout steps (no failing SLI on the nginx
# demo app), so this suite drives the rollback via an explicit abort and asserts
# the controller returns the live HTTPRoute weight to 0. Same auto-rollback code
# path an analysis failure would trigger.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: rollouts-canary-rollback
  annotations:
    kaddy.io/req: REQ-E7-S02-02
    # Un-skipped by CI substrate parity (2026-07-16): same substrate as
    # canary-weights — Cilium Gateway + Argo Rollouts + the Gateway API plugin
    # (linux-amd64 in CI, pinned v0.16.0) + deploy/workloads/mulligan/, all
    # stood up by the chainsaw workflow. Also verified PASSING live with:
    #   chainsaw test --test-file tests/chainsaw/rollouts/canary-rollback.yaml .
    kaddy.io/status: ci-enforced-2026-07-16-substrate-parity
spec:
  # This suite and canary-weights mutate the SAME mulligan Rollout/HTTPRoute;
  # serialize so a full `chainsaw test tests/chainsaw` run cannot interleave them.
  concurrent: false
  description: After aborting a canary the mulligan HTTPRoute canary weight returns to 0.
  namespace: mulligan
  steps:
    - name: trigger-canary
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                namespace: mulligan
                name: mulligan
              spec:
                template:
                  metadata:
                    annotations:
                      kaddy.io/chainsaw-rollback: "trigger"
        - assert:
            timeout: 120s
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: mulligan
                name: mulligan
              spec:
                (rules[0].backendRefs[?name == 'mulligan-canary'].weight | [0] > `0`): true
    - name: abort-rollout
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                namespace: mulligan
                name: mulligan
              status:
                abort: true
    - name: weights-return-to-stable
      try:
        - assert:
            timeout: 120s
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: mulligan
                name: mulligan
              spec:
                (rules[0].backendRefs[?name == 'mulligan-canary'].weight | [0]): 0
      catch:
        - get:
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            name: mulligan
    - name: un-abort-cleanup
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                namespace: mulligan
                name: mulligan
              status:
                abort: false

# REQ-E7-S02-01: canary Rollout shifts HTTPRoute backend weights.
# Assumes the argo-rollouts controller + Gateway API plugin + the mulligan
# manifests (deploy/rollouts, deploy/workloads/mulligan) are already applied
# (GitOps sync or `task bootstrap:e7`).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: rollouts-canary-weights
  annotations:
    kaddy.io/req: REQ-E7-S02-01
    # Un-skipped by CI substrate parity (2026-07-16): chainsaw CI now builds its
    # cluster from the LIVE substrate recipe (hack/cluster/kind-up.sh — Cilium +
    # Gateway API CRDs + LB-IPAM + cert-manager/kaddy-local-ca, pinned via
    # hack/cluster/versions.env), installs Argo Rollouts +
    # the Gateway API trafficRouting plugin (arch-rewritten to linux-amd64 for
    # the runner, same pinned v0.16.0) and applies deploy/workloads/mulligan/.
    # Also verified PASSING against the live kind-kaddy-dev cluster with:
    #   chainsaw test --test-file tests/chainsaw/rollouts/canary-weights.yaml .
    kaddy.io/status: ci-enforced-2026-07-16-substrate-parity
spec:
  # This suite and canary-rollback mutate the SAME mulligan Rollout/HTTPRoute;
  # serialize so a full `chainsaw test tests/chainsaw` run cannot interleave them.
  concurrent: false
  description: During a canary the mulligan HTTPRoute carries a non-zero canary backend weight.
  namespace: mulligan
  steps:
    - name: rollout-and-route-exist
      try:
        - assert:
            timeout: 60s
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                namespace: mulligan
                name: mulligan
                labels:
                  owner: platform-team
                  service: mulligan
                  part-of: kaddy
                  managed-by: argocd
                  track: stable
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: mulligan
                name: mulligan
    - name: trigger-canary
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                namespace: mulligan
                name: mulligan
              spec:
                template:
                  metadata:
                    annotations:
                      kaddy.io/chainsaw-canary: "trigger"
    - name: canary-weight-is-nonzero
      try:
        - assert:
            timeout: 120s
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: mulligan
                name: mulligan
              spec:
                # The Gateway API plugin sets the canary backendRef weight > 0.
                (rules[0].backendRefs[?name == 'mulligan-canary'].weight | [0] > `0`): true
      catch:
        - get:
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            name: mulligan

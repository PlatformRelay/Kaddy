#!/usr/bin/env bash
# release-provenance — ROADMAP tag-provenance ancestry guard (offline).
#
# DOC-10's status guard checks ROADMAP *status strings* but does NOT assert
# release-provenance: a hand-authored claim like "E9 shipped in v0.1.1" passed
# it even though E9 landed AFTER the v0.1.1 tag (fixed in 431a980). This guard
# closes that gap by verifying every machine-parseable "<epic> ... v<X.Y.Z>"
# provenance claim in docs/ROADMAP.md against the git DAG:
#
#   "after v<X.Y.Z>"          => the epic's EARLIEST commit must NOT be an
#                                ancestor of that tag (it landed after the tag).
#   "in v<X.Y.Z>" /           => the epic's NEWEST commit MUST be an ancestor of
#   "shipped in v<X.Y.Z>"        that tag (it shipped in / before that tag).
#
# We key off the ROADMAP (hand-authored prose = the falsifiable source, where
# the original bug lived) — NOT the CHANGELOG, whose per-tag sections are
# git-cliff-generated by walking commits reachable from each tag, so their
# ancestry holds by construction (vacuous to assert).
#
# Environment: LOCALLY (dev, $CI unset) SKIP (warn, don't fail) on a shallow
# clone or a missing tag for ergonomics. On CI ($CI set) a skip-that-passes is
# the exact DOC-10 trust-break this guard exists to prevent, so those env gaps
# FAIL instead — CI must fetch full history + tags. Only FAIL on a genuine
# ancestry violation regardless. If the ROADMAP makes no parseable claim, PASS
# as a clear no-op.
set -euo pipefail
ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
R="$ROOT/docs/ROADMAP.md"
cd "$ROOT"

fail() { echo "FAIL: $*" >&2; exit 1; }
warn() { echo "WARN: $*" >&2; }

[ -f "$R" ] || fail "docs/ROADMAP.md not found at $R"

# on_env_gap <message> : how to react to an environment gap (shallow clone /
# missing tag). On CI this is fatal (a green skip verifies nothing — the DOC-10
# trust-break); locally it's a graceful skip for dev ergonomics.
on_env_gap() {
  if [ -n "${CI:-}" ]; then
    fail "$1 (on CI). The workflow's actions/checkout needs 'fetch-depth: 0' + 'fetch-tags: true' — see tests/meta/verify-fetch-depth.yaml"
  fi
}

# Env guard: ancestry checks are meaningless on a shallow clone (commits/tags
# may be absent from the truncated history). Locally SKIP; on CI FAIL.
if [ "$(git rev-parse --is-shallow-repository 2>/dev/null || echo true)" = "true" ]; then
  on_env_gap "shallow clone — release-provenance cannot check ancestry"
  echo "SKIP: release-provenance — shallow clone (no full DAG to check ancestry); dev-only skip"
  exit 0
fi

# earliest_commit <epic-id-lowercase> : oldest commit whose conventional scope
# is exactly this epic (e.g. feat(e9): ...). Anchored on "(e9)" / "(e9:" so a
# loose "e1" can't mis-bind e1b/e1c/e1g. Empty if the epic has no commits.
epic_commit() {  # $1=epic (lowercase), $2=which (earliest|newest)
  local epic="$1" which="$2" order
  # git log is newest-first; `head -1` => newest, `tail -1` => earliest.
  if [ "$which" = "earliest" ]; then order="tail -1"; else order="head -1"; fi
  # `|| true` on the grep: with no scope match it exits 1, which under
  # `set -o pipefail` would abort the whole script at the `c="$(...)"` capture
  # BEFORE the caller's empty-`c` skip could run — turning a legitimate
  # "epic claimed before its commits landed" state into a crash. Swallow it so
  # the caller sees an empty string and skips/fails deliberately.
  git log --all --format='%H %s' \
    | { grep -iE "\($epic[):]" || true; } \
    | eval "$order" \
    | awk '{print $1}'
}

pairs=0
checked=0

# Parse ROADMAP epic headers: "## E9 · Caddy operator ... after v0.1.1 ...".
# We only consider lines that (a) start an epic section (## E<id>) and (b)
# carry an explicit v<X.Y.Z> provenance token — the falsifiable, ID-bound claim.
while IFS= read -r line; do
  # Epic id, e.g. E9 / E1c / E6g — the token right after "## ".
  epic="$(printf '%s\n' "$line" | sed -nE 's/^## (E[0-9A-Za-z]+) .*/\1/p')"
  [ -n "$epic" ] || continue
  epic_lc="$(printf '%s' "$epic" | tr '[:upper:]' '[:lower:]')"

  # Extract every "(after|in|shipped in) v<X.Y.Z>" claim on the header line.
  # Emits one "keyword<TAB>vX.Y.Z" per claim.
  while IFS=$'\t' read -r kw tag; do
    [ -n "${tag:-}" ] || continue
    pairs=$((pairs + 1))

    if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
      on_env_gap "$epic claims '$kw $tag' but tag $tag is missing"
      warn "$epic claims '$kw $tag' but tag $tag is missing — skipping (dev env)"
      continue
    fi

    # is_ancestor <commit> <tag> : 0 = ancestor, 1 = not ancestor. Any other
    # exit is a git ERROR (malformed ref / broken object) — never silently
    # treated as "not ancestor" (fail-open). Both keyword branches share this so
    # a malformed ref fails loudly and symmetrically (P3 fix).
    is_ancestor() {
      local rc=0
      git merge-base --is-ancestor "$1" "$2" || rc=$?
      case "$rc" in
        0|1) return "$rc" ;;
        *) fail "git merge-base --is-ancestor $1 $2 errored (rc=$rc) — malformed ref/object, cannot verify $epic" ;;
      esac
    }

    case "$kw" in
      after)
        c="$(epic_commit "$epic_lc" earliest)"
        if [ -z "$c" ]; then
          on_env_gap "$epic: no commits found for scope ($epic_lc)"
          warn "$epic: no commits found for scope ($epic_lc) — skipping (dev env)"; continue
        fi
        checked=$((checked + 1))
        # "landed after v<tag>" => earliest epic commit must NOT be an ancestor.
        if is_ancestor "$c" "$tag"; then
          fail "$epic claims it landed AFTER $tag, but its earliest commit ${c:0:12} IS an ancestor of $tag (it was already in $tag)"
        fi
        echo "  OK  $epic landed after $tag (earliest ${c:0:12} not an ancestor of $tag)"
        ;;
      in|"shipped in")
        c="$(epic_commit "$epic_lc" newest)"
        if [ -z "$c" ]; then
          on_env_gap "$epic: no commits found for scope ($epic_lc)"
          warn "$epic: no commits found for scope ($epic_lc) — skipping (dev env)"; continue
        fi
        checked=$((checked + 1))
        # "shipped in v<tag>" => newest epic commit must BE an ancestor.
        if ! is_ancestor "$c" "$tag"; then
          fail "$epic claims it shipped in $tag, but its newest commit ${c:0:12} is NOT an ancestor of $tag (it landed after $tag)"
        fi
        echo "  OK  $epic shipped in $tag (newest ${c:0:12} is an ancestor of $tag)"
        ;;
      *)
        warn "$epic: unrecognized provenance keyword '$kw' — skipping"
        ;;
    esac
  done < <(printf '%s\n' "$line" \
    | grep -oiE '(shipped in|after|in) v[0-9]+\.[0-9]+\.[0-9]+' \
    | sed -E 's/^(shipped in|after|in) (v[0-9]+\.[0-9]+\.[0-9]+)$/\1\t\2/I' \
    | tr '[:upper:]' '[:lower:]')
done < <(grep -nE '^## E[0-9]' "$R" | sed -E 's/^[0-9]+://')

if [ "$pairs" -eq 0 ]; then
  echo "OK: release-provenance — no shipped-in-tag claims to verify (no-op)"
  exit 0
fi
if [ "$checked" -eq 0 ]; then
  # Reachable only locally: on CI on_env_gap already FAILed for any missing tag /
  # scope. Here every claim was dev-skipped (missing tag or no epic commits).
  echo "OK: release-provenance — $pairs claim(s) present, all dev-env-skipped (missing tags / no epic commits); CI would FAIL"
  exit 0
fi
echo "OK: release-provenance — $checked/$pairs ROADMAP tag-provenance claim(s) DAG-verified"

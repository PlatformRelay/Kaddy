#!/usr/bin/env bash
# DOC-10 — ROADMAP status-truth guard (offline).
set -euo pipefail
ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
R="$ROOT/docs/ROADMAP.md"
fail() { echo "FAIL: $*" >&2; exit 1; }
grep -qF '15/15' "$R" || fail "ROADMAP intro must claim 15/15 GitOps apps"
! grep -qE '9/9 GitOps' "$R" || fail "ROADMAP still claims stale 9/9"
grep -qE 'E1c · Security baseline ✅' "$R" || fail "E1c header must be ✅"
grep -qE 'E1d · Identity.*✅' "$R" || fail "E1d header must be ✅"
grep -qE 'E1d-S01.*\| ✅' "$R" || fail "E1d-S01 row must be ✅"
grep -qE 'E1d-S02.*\| ✅' "$R" || fail "E1d-S02 row must be ✅"
grep -qE 'E1d-S03.*\| ⬜.*deferred' "$R" || fail "E1d-S03 row must be ⬜ (deferred → E10)"
grep -qE 'E1d-S04.*\| ✅' "$R" || fail "E1d-S04 row must be ✅"
grep -qE 'E11-S01.*\| ✅' "$R" || fail "E11-S01 row must be ✅"
grep -qF 'audits/2026-07-16-audit.md' "$R" || fail "E11-S01 must point at 2026-07-16 audit"
grep -qE 'E6 · Crossplane.*✅' "$R" || fail "E6 header must be ✅"
grep -qE 'E8 · Evidence.*✅' "$R" || fail "E8 header must be ✅"
grep -qE 'E8-S04.*\| ✅' "$R" || fail "E8-S04 row must be ✅"
echo "OK: DOC-10 ROADMAP status-truth"

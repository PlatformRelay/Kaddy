# Fixtures — disallow-privileged-containers (ADR-0106 pod-security baseline).
apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: default
  labels:
    service: clubhouse
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-no-securitycontext
  namespace: default
  labels:
    service: clubhouse
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged-pod
  namespace: default
  labels:
    service: clubhouse
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
      securityContext:
        privileged: true
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged-initcontainer-pod
  namespace: default
  labels:
    service: clubhouse
spec:
  initContainers:
    - name: init
      image: busybox:1.36.1
      securityContext:
        privileged: true
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine

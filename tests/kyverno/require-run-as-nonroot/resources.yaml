# Fixtures — require-run-as-nonroot (ADR-0106 pod-security baseline).
# good-pod-podlevel mirrors the clubhouse Deployment (pod-level runAsNonRoot);
# good-pod-containerlevel sets it per container; bad pods omit it or run root.
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-podlevel
  namespace: default
  labels:
    service: clubhouse
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-containerlevel
  namespace: default
  labels:
    service: clubhouse
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
      securityContext:
        runAsNonRoot: true
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-unset
  namespace: default
  labels:
    service: clubhouse
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-explicit-root
  namespace: default
  labels:
    service: clubhouse
spec:
  securityContext:
    runAsNonRoot: false
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine
---
# E1c cutover excludes (narrow, documented in the policy): the Alloy
# DaemonSet tails /var/log as root (name+namespace-scoped skip)...
apiVersion: v1
kind: Pod
metadata:
  name: alloy-rk6cf
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
spec:
  containers:
    - name: alloy
      image: grafana/alloy:v1.10.0
---
# ...the ephemeral e1e-smoke fixture namespace is skipped...
apiVersion: v1
kind: Pod
metadata:
  name: echo-5bc498b866-aaaaa
  namespace: e1e-smoke
  labels:
    app: echo
spec:
  containers:
    - name: echo
      image: hashicorp/http-echo:1.0.0
---
# ...and any OTHER root-running monitoring pod stays DENIED (proves the
# alloy exclude is name-scoped, not namespace-wide).
apiVersion: v1
kind: Pod
metadata:
  name: rogue-root-pod
  namespace: monitoring
  labels:
    app.kubernetes.io/name: rogue
spec:
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29.0-alpine

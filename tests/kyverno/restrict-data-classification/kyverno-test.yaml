# kyverno test — restrict-data-classification (REQ-E1b-S05-02, D-024).
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: restrict-data-classification
policies:
  - ../../../deploy/policies/kyverno/restrict-data-classification.yaml
resources:
  - resources.yaml
results:
  - policy: restrict-data-classification
    rule: validate-data-classification-value
    kind: Pod
    resources:
      - default/good-pod
    result: pass
  - policy: restrict-data-classification
    rule: validate-data-classification-value
    kind: Pod
    resources:
      - default/bad-value-pod
    result: fail
  - policy: restrict-data-classification
    rule: validate-data-classification-value
    kind: Pod
    resources:
      - default/missing-label-pod
    result: fail

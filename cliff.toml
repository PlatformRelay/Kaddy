# git-cliff configuration — kaddy release notes from gitmoji-conventional commits.
# Commits look like ":sparkles: feat(gitops): ..." — strip the gitmoji shortcode,
# then parse as conventional commits.

[changelog]
header = """
# Changelog — kaddy\n
All notable changes to the kaddy platform. Generated with git-cliff from
gitmoji-conventional commit history.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_preprocessors = [
  # Strip the leading gitmoji shortcode (":sparkles: feat(x): y" -> "feat(x): y").
  { pattern = '^:[a-z0-9_+-]+: ', replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Fixes" },
  { message = "^test", group = "<!-- 2 -->Tests" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^refactor", group = "<!-- 4 -->Refactoring" },
  { message = "^(ci|build)", group = "<!-- 5 -->CI & build" },
  { message = "^(chore|style|perf)", group = "<!-- 6 -->Chores" },
  { message = ".*", group = "<!-- 7 -->Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
